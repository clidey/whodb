  #     sqlite3 /root/db/e2e_test.db < /docker-entrypoint-initdb.d/init.sql &&
  #     echo 'SQLite3 Started...' &&
  #     tail -f /dev/null
  #     "

  e2e_postgres:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: jio53$*(@nfe)
      PGDATA: /data/postgres
      POSTGRES_DB: test_db
    command: postgres -c max_connections=300
    volumes:
      - e2e_postgres:/data/postgres
      - ./sample-data/postgres/data.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - db

  e2e_mysql:
    image: mysql
    environment:
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - e2e_mysql:/var/lib/mysql
      - ./sample-data/mysql/data.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - db

  e2e_mysql_842:
    image: mysql:8.4.2
    environment:
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - e2e_mysql_842:/var/lib/mysql
      - ./sample-data/mysql/data842.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
    networks:
      - db

  e2e_mariadb:
    image: mariadb
    environment:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_DATABASE: test_db
      MARIADB_ROOT_PASSWORD: password
    volumes:
      - e2e_mariadb:/var/lib/mysql
      - ./sample-data/mariadb/data.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - db

  e2e_mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: test_db
    volumes:
      - e2e_mongo:/data/db
      - ./sample-data/mongo/data.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - db

  e2e_mongo_noauth:
    image: mongo
    environment:
      MONGO_INITDB_DATABASE: test_db
    volumes:
      - e2e_mongo_noauth:/data/db
      - ./sample-data/mongo/data.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27019:27017"
    networks:
      - db

  e2e_cockroachdb:
    image: cockroachdb/cockroach:latest
    container_name: e2e_cockroachdb
    hostname: e2e_cockroachdb
    entrypoint: ["/cockroach/cockroach"]
    command:
      - start
      - --insecure
      - --listen-addr=e2e_cockroachdb:26357
      - --advertise-addr=e2e_cockroachdb:26357
      - --sql-addr=e2e_cockroachdb:26257
      - --http-addr=e2e_cockroachdb:8080
      - --join=e2e_cockroachdb:26357
      - --max-offset=5s
    ports:
      - "26257:26257"
    volumes:
      - e2e_cockroachdb:/cockroach/cockroach-data
    networks:
      - db

  cockroachdb-init:
    image: cockroachdb/cockroach:latest
    depends_on:
      - e2e_cockroachdb
    volumes:
      - ./sample-data/cockroachdb/data.sql:/data.sql:ro
      - ./sample-data/cockroachdb/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - db

  e2e_clickhouse:
    image: clickhouse/clickhouse-server
    user: clickhouse:clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: user
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DB: test_db
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "true"
    volumes:
      - e2e_clickhouse:/var/lib/clickhouse
      - ./sample-data/clickhouse/data.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - db

  e2e_redis:
    image: redis:latest
    container_name: e2e_redis
    ports:
      - "6379:6379"
    volumes:
      - e2e_redis:/data
    networks:
      - db
    command: redis-server --requirepass password

  redis-init:
    image: redis:latest
    depends_on:
      - e2e_redis
    volumes:
      - ./sample-data/redis/init.sh:/init.sh
    entrypoint: >
      sh -c "
        chmod +x /init.sh &&
        /init.sh
      "
    networks:
      - db

  e2e_memcached:
    image: memcached:latest
    container_name: e2e_memcached
    ports:
      - "11211:11211"
    networks:
      - db
    command: memcached -m 64

  memcached-init:
    image: alpine:latest
    depends_on:
      - e2e_memcached
    volumes:
      - ./sample-data/memcached/init.sh:/init.sh
    entrypoint: >
      sh -c "
        chmod +x /init.sh &&
        /init.sh
      "
    networks:
      - db

  # todo: this version is old, need to look into upgrading to a newer
  e2e_elasticsearch:
    image: elasticsearch:8.11.1
    container_name: e2e_elasticsearch
    platform: linux/amd64
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      # Disable disk watermark for dev environments with limited disk space
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - e2e_elasticsearch:/usr/share/elasticsearch/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch-init:
    image: curlimages/curl:latest
    depends_on:
      e2e_elasticsearch:
        condition: service_healthy
    volumes:
      - ./sample-data/elasticsearch/upload.sh:/upload.sh:ro
    entrypoint: ["/bin/sh", "-c", "sh /upload.sh"]
    networks:
      - db

