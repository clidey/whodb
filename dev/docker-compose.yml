  #   image: nouchka/sqlite3:latest
  #   container_name: e2e_sqlite3
  #   volumes:
  #     - e2e_sqlite3:/root/db
  #     - ./sample-data/sqlite3/data.sql:/docker-entrypoint-initdb.d/init.sql
  #   entrypoint: >
