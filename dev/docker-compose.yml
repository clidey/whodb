  e2e_tidb:
    image: pingcap/tidb:latest
    ports:
      - "4002:4000"
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:10080/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  tidb-init:
    image: mysql:latest
    depends_on:
      e2e_tidb:
        condition: service_healthy
    volumes:
      - ./sample-data/tidb/data.sql:/init.sql:ro
    entrypoint: >
      sh -c "
        mysql -h e2e_tidb -P 4000 -u root < /init.sql &&
        mysql -h e2e_tidb -P 4000 -u root -e \"CREATE USER IF NOT EXISTS 'user'@'%' IDENTIFIED BY 'password'; GRANT ALL PRIVILEGES ON test_db.* TO 'user'@'%'; FLUSH PRIVILEGES;\" &&
        echo 'TiDB initialized successfully'
      "
    networks:
      - db

  # ===== Database alias containers =====

  e2e_valkey:
    image: valkey/valkey:latest
    container_name: e2e_valkey
    ports:
      - "6382:6379"
    volumes:
      - e2e_valkey:/data
    networks:
      - db
    command: valkey-server --requirepass password

  valkey-init:
    image: valkey/valkey:latest
    depends_on:
      - e2e_valkey
    volumes:
      - ./sample-data/redis/init.sh:/init.sh
    environment:
      REDIS_HOST: e2e_valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: password
    entrypoint: >
      sh -c "
        chmod +x /init.sh &&
        /init.sh
      "
    networks:
      - db

  e2e_dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: e2e_dragonfly
    ports:
      - "6383:6379"
    volumes:
      - e2e_dragonfly:/data
    networks:
      - db
    command: dragonfly --requirepass password

  dragonfly-init:
    image: redis:latest
    depends_on:
      - e2e_dragonfly
    volumes:
      - ./sample-data/redis/init.sh:/init.sh
    environment:
      REDIS_HOST: e2e_dragonfly
      REDIS_PORT: "6379"
      REDIS_PASSWORD: password
    entrypoint: >
      sh -c "
        chmod +x /init.sh &&
        /init.sh
      "
    networks:
      - db

  e2e_opensearch:
    image: opensearchproject/opensearch:2
    container_name: e2e_opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      - cluster.routing.allocation.disk.threshold_enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9202:9200"
    volumes:
      - e2e_opensearch:/usr/share/opensearch/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-init:
    image: curlimages/curl:latest
    depends_on:
      e2e_opensearch:
        condition: service_healthy
    volumes:
      - ./sample-data/opensearch/upload.sh:/upload.sh:ro
    entrypoint: ["/bin/sh", "-c", "sh /upload.sh"]
    networks:
      - db

  e2e_yugabytedb:
    image: yugabytedb/yugabyte:latest
    container_name: e2e_yugabytedb
    command: >
      bash -c "
        bin/yugabyted start --daemon=false --advertise_address=0.0.0.0 --master_flags='max_clock_skew_usec=5000000' --tserver_flags='ysql_enable_auth=true,pgsql_proxy_bind_address=0.0.0.0:5433,max_clock_skew_usec=5000000'
      "
    ports:
      - "5434:5433"
      - "7001:7000"
    volumes:
      - e2e_yugabytedb:/root/var
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=yugabyte ysqlsh -h localhost -p 5433 -U yugabyte -c 'SELECT 1' || exit 1"]
      start_period: 30s
      interval: 15s
      timeout: 10s
      retries: 20

  yugabytedb-init:
    image: postgres:latest
    depends_on:
      e2e_yugabytedb:
        condition: service_healthy
    volumes:
      - ./sample-data/yugabytedb/data.sql:/data.sql:ro
      - ./sample-data/yugabytedb/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - db

  e2e_questdb:
    image: questdb/questdb:latest
    container_name: e2e_questdb
    environment:
      QDB_PG_USER: user
      QDB_PG_PASSWORD: password
    ports:
      - "8812:8812"
      - "9003:9000"
    volumes:
      - e2e_questdb:/var/lib/questdb
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/exec?query=SELECT%201 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  questdb-init:
    image: postgres:latest
    depends_on:
      e2e_questdb:
        condition: service_healthy
    volumes:
      - ./sample-data/questdb/data.sql:/data.sql:ro
    entrypoint: >
      sh -c "
        PGPASSWORD=password psql -h e2e_questdb -p 8812 -U user -d qdb -f /data.sql &&
        echo 'QuestDB data loaded'
      "
    networks:
      - db

  e2e_ferretdb_pg:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    container_name: e2e_ferretdb_pg
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - e2e_ferretdb_pg:/var/lib/postgresql/data
    networks:
      - db

  e2e_ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    container_name: e2e_ferretdb
    depends_on:
      - e2e_ferretdb_pg
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://user:password@e2e_ferretdb_pg:5432/postgres
    ports:
      - "27020:27017"
    networks:
      - db
    healthcheck:
      test: ["CMD", "/ferretdb", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ferretdb-init:
    image: mongo:latest
    depends_on:
      e2e_ferretdb:
        condition: service_healthy
    volumes:
      - ./sample-data/mongo/data.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    entrypoint: >
      sh -c "
        mongosh 'mongodb://user:password@e2e_ferretdb:27017/test_db?authSource=admin' /docker-entrypoint-initdb.d/mongo-init.js &&
        echo 'FerretDB data loaded'
      "
    networks:
      - db

  # SSL-enabled PostgreSQL for SSL E2E tests
  e2e_postgres_ssl:
    profiles: ["ssl"]
    image: postgres
    container_name: e2e_postgres_ssl
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: jio53$*(@nfe)
      POSTGRES_DB: test_db
      PGDATA: /data/postgres
    volumes:
      - e2e_postgres_ssl:/data/postgres
      - ./sample-data/postgres/data.sql:/docker-entrypoint-initdb.d/init.sql
      - ./certs/server/postgres/server-cert.pem:/certs-src/server-cert.pem:ro
      - ./certs/server/postgres/server-key.pem:/certs-src/server-key.pem:ro
      - ./certs/ca/postgres/ca.pem:/certs-src/ca.pem:ro
    command: >
      bash -c "
        mkdir -p /certs &&
        cp /certs-src/* /certs/ &&
        chown postgres:postgres /certs/* &&
        chmod 600 /certs/server-key.pem &&
        chmod 644 /certs/server-cert.pem /certs/ca.pem &&
        exec docker-entrypoint.sh postgres -c ssl=on -c ssl_cert_file=/certs/server-cert.pem -c ssl_key_file=/certs/server-key.pem -c ssl_ca_file=/certs/ca.pem
      "
    ports:
      - "5433:5432"
    networks:
      - db

  # SSL-enabled MySQL for SSL E2E tests
  e2e_mysql_ssl:
    profiles: ["ssl"]
    image: mysql
    container_name: e2e_mysql_ssl
    environment:
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - e2e_mysql_ssl:/var/lib/mysql
      - ./sample-data/mysql/data.sql:/docker-entrypoint-initdb.d/init.sql
      - ./certs/ca/mysql/ca.pem:/etc/mysql/certs/ca.pem:ro
      - ./certs/server/mysql/server-cert.pem:/etc/mysql/certs/server-cert.pem:ro
      - ./certs/server/mysql/server-key.pem:/etc/mysql/certs/server-key.pem:ro
      - ./conf/mysql_ssl.cnf:/etc/mysql/conf.d/ssl.cnf:ro
    ports:
      - "3309:3306"
    networks:
      - db

  # SSL-enabled MariaDB for SSL E2E tests
  e2e_mariadb_ssl:
    profiles: ["ssl"]
    image: mariadb
    container_name: e2e_mariadb_ssl
    environment:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_DATABASE: test_db
      MARIADB_ROOT_PASSWORD: password
    volumes:
      - e2e_mariadb_ssl:/var/lib/mysql
      - ./sample-data/mariadb/data.sql:/docker-entrypoint-initdb.d/init.sql
      - ./certs/ca/mariadb/ca.pem:/etc/mysql/certs/ca.pem:ro
      - ./certs/server/mariadb/server-cert.pem:/etc/mysql/certs/server-cert.pem:ro
      - ./certs/server/mariadb/server-key.pem:/etc/mysql/certs/server-key.pem:ro
      - ./conf/mariadb_ssl.cnf:/etc/mysql/conf.d/ssl.cnf:ro
    ports:
      - "3310:3306"
    networks:
      - db

  # SSL-enabled MongoDB for SSL E2E tests
  e2e_mongo_ssl:
    profiles: ["ssl"]
    image: mongo
    container_name: e2e_mongo_ssl
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: test_db
    volumes:
      - e2e_mongo_ssl:/data/db
      - ./sample-data/mongo/data.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./certs/server/mongodb/mongodb.pem:/etc/ssl/mongodb.pem:ro
      - ./certs/ca/mongodb/ca.pem:/etc/ssl/ca.pem:ro
    ports:
      - "27018:27017"
    networks:
      - db
    command: mongod --tlsMode requireTLS --tlsCertificateKeyFile /etc/ssl/mongodb.pem --tlsCAFile /etc/ssl/ca.pem --tlsAllowConnectionsWithoutCertificates

  # SSL-enabled Redis for SSL E2E tests
  e2e_redis_ssl:
    profiles: ["ssl"]
    image: redis:latest
    container_name: e2e_redis_ssl
    ports:
      - "6380:6379"
    volumes:
      - e2e_redis_ssl:/data
      - ./certs/server/redis/server-cert.pem:/tls/server-cert.pem:ro
      - ./certs/server/redis/server-key.pem:/tls/server-key.pem:ro
      - ./certs/ca/redis/ca.pem:/tls/ca.pem:ro
      - ./conf/redis_ssl.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - db
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/tls/ca.pem", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-ssl-init:
    profiles: ["ssl"]
    image: redis:latest
    depends_on:
      e2e_redis_ssl:
        condition: service_healthy
    volumes:
      - ./sample-data/redis/init.sh:/init.sh:ro
      - ./certs/ca/redis/ca.pem:/certs/ca.pem:ro
    environment:
      REDIS_HOST: e2e_redis_ssl
      REDIS_PORT: "6379"
      REDIS_PASSWORD: password
      REDIS_CACERT: /certs/ca.pem
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - db

  # SSL-enabled CockroachDB for SSL E2E tests
  e2e_cockroachdb_ssl:
    profiles: ["ssl"]
    image: cockroachdb/cockroach:latest
    container_name: e2e_cockroachdb_ssl
    hostname: e2e_cockroachdb_ssl
    command:
      - bash
      - -c
      - |
        mkdir -p /certs &&
        cp /certs-src/ca.pem /certs/ca.crt &&
        cp /certs-src/server-cert.pem /certs/node.crt &&
        cp /certs-src/server-key.pem /certs/node.key &&
        cp /certs-src/client-cert.pem /certs/client.root.crt &&
        cp /certs-src/client-key.pem /certs/client.root.key &&
        chmod 600 /certs/node.key /certs/client.root.key &&
        chmod 644 /certs/ca.crt /certs/node.crt /certs/client.root.crt &&
        exec /cockroach/cockroach start --certs-dir=/certs --listen-addr=e2e_cockroachdb_ssl:26357 --advertise-addr=e2e_cockroachdb_ssl:26357 --sql-addr=e2e_cockroachdb_ssl:26257 --http-addr=e2e_cockroachdb_ssl:8080 --join=e2e_cockroachdb_ssl:26357 --max-offset=5s
    ports:
      - "26258:26257"
    volumes:
      - e2e_cockroachdb_ssl:/cockroach/cockroach-data
      - ./certs/ca/cockroachdb/ca.pem:/certs-src/ca.pem:ro
      - ./certs/server/cockroachdb/server-cert.pem:/certs-src/server-cert.pem:ro
      - ./certs/server/cockroachdb/server-key.pem:/certs-src/server-key.pem:ro
      - ./certs/client/cockroachdb/client-cert.pem:/certs-src/client-cert.pem:ro
      - ./certs/client/cockroachdb/client-key.pem:/certs-src/client-key.pem:ro
    networks:
      - db

  cockroachdb-ssl-init:
    profiles: ["ssl"]
    image: cockroachdb/cockroach:latest
    depends_on:
      - e2e_cockroachdb_ssl
    volumes:
      - ./sample-data/cockroachdb/data.sql:/data.sql:ro
      - ./sample-data/cockroachdb/init.sh:/init.sh:ro
      - ./certs/ca/cockroachdb/ca.pem:/certs/ca.crt:ro
      - ./certs/client/cockroachdb/client-cert.pem:/certs/client.root.crt:ro
      - ./certs/client/cockroachdb/client-key.pem:/certs/client.root.key:ro
    environment:
      COCKROACH_HOST: e2e_cockroachdb_ssl
      COCKROACH_PORT: "26257"
    entrypoint: >
      sh -c "
        cp /certs/client.root.key /tmp/client.root.key &&
        chmod 600 /tmp/client.root.key &&
        mkdir -p /tmp/certs &&
        cp /certs/ca.crt /tmp/certs/ &&
        cp /certs/client.root.crt /tmp/certs/ &&
        cp /tmp/client.root.key /tmp/certs/ &&
        COCKROACH_CERTS_DIR=/tmp/certs /init.sh &&
        cockroach sql --certs-dir=/tmp/certs --host=e2e_cockroachdb_ssl:26257 -e \"ALTER USER \\\"user\\\" WITH PASSWORD 'password';\"
      "
    networks:
      - db

  # SSL-enabled Memcached for SSL E2E tests
  e2e_memcached_ssl:
    profiles: ["ssl"]
    image: memcached:latest
    container_name: e2e_memcached_ssl
    ports:
      - "11212:11211"
    volumes:
      - ./certs/server/memcached/server-cert.pem:/tls/server-cert.pem:ro
      - ./certs/server/memcached/server-key.pem:/tls/server-key.pem:ro
      - ./certs/ca/memcached/ca.pem:/tls/ca.pem:ro
    networks:
      - db
    command: memcached -m 64 -Z -o ssl_chain_cert=/tls/server-cert.pem,ssl_key=/tls/server-key.pem
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/11211"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached-ssl-init:
    profiles: ["ssl"]
    image: debian:bookworm-slim
    depends_on:
      e2e_memcached_ssl:
        condition: service_healthy
    volumes:
      - ./sample-data/memcached/init.sh:/init.sh:ro
    environment:
      MEMCACHED_HOST: e2e_memcached_ssl
      MEMCACHED_PORT: "11211"
      MEMCACHED_TLS: "true"
    entrypoint: >
      sh -c "
        apt-get update -qq && apt-get install -y -qq openssl netcat-openbsd >/dev/null 2>&1 &&
        /bin/sh /init.sh
      "
    networks:
      - db

  # SSL-enabled ClickHouse for SSL E2E tests
  e2e_clickhouse_ssl:
    profiles: ["ssl"]
    image: clickhouse/clickhouse-server
    container_name: e2e_clickhouse_ssl
    user: clickhouse:clickhouse
    ports:
      - "8443:8443"
      - "9440:9440"
    environment:
      CLICKHOUSE_USER: user
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DB: test_db
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "true"
    volumes:
      - e2e_clickhouse_ssl:/var/lib/clickhouse
      - ./sample-data/clickhouse/data.sql:/docker-entrypoint-initdb.d/init.sql
      - ./certs/ca/clickhouse/ca.pem:/etc/clickhouse-server/certs/ca.pem:ro
      - ./certs/server/clickhouse/server-cert.pem:/etc/clickhouse-server/certs/server-cert.pem:ro
      - ./certs/server/clickhouse/server-key.pem:/etc/clickhouse-server/certs/server-key.pem:ro
      - ./conf/clickhouse_ssl.xml:/etc/clickhouse-server/config.d/ssl.xml:ro
    networks:
      - db

  # SSL-enabled Elasticsearch for SSL E2E tests
  e2e_elasticsearch_ssl:
    profiles: ["ssl"]
    image: elasticsearch:8.11.1
    container_name: e2e_elasticsearch_ssl
    platform: linux/amd64
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.ml.enabled=false
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/server-key.pem
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/server-cert.pem
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.pem
      - xpack.security.http.ssl.verification_mode=none
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=password
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9201:9200"
    volumes:
      - e2e_elasticsearch_ssl:/usr/share/elasticsearch/data
      - ./certs/ca/elasticsearch/ca.pem:/usr/share/elasticsearch/config/certs/ca.pem:ro
      - ./certs/server/elasticsearch/server-cert.pem:/usr/share/elasticsearch/config/certs/server-cert.pem:ro
      - ./certs/server/elasticsearch/server-key.pem:/usr/share/elasticsearch/config/certs/server-key.pem:ro
    networks:
      db:
        aliases:
          - es-ssl
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k https://localhost:9200/_cluster/health -u elastic:password || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch-ssl-init:
    profiles: ["ssl"]
    image: curlimages/curl:latest
    depends_on:
      e2e_elasticsearch_ssl:
        condition: service_healthy
    volumes:
      - ./sample-data/elasticsearch/upload.sh:/upload.sh:ro
      - ./certs/ca/elasticsearch/ca.pem:/certs/ca.pem:ro
    entrypoint: ["/bin/sh", "-c", "ES_HOST=https://es-ssl:9200 ES_USER=elastic ES_PASS=password ES_CACERT=/certs/ca.pem sh /upload.sh"]
    networks:
      - db

networks:
  db:
    driver: bridge

