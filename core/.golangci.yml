version: "2"

run:
  go: "1.26.1"
  build-tags:
    - integration

linters:
  enable:
    - gounslop
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - forbidigo
    - misspell
    - unconvert
    - nakedret
    - goconst
    - sqlclosecheck
    - rowserrcheck
    - errorlint
    - nilerr
    - durationcheck
    - noctx
    - perfsprint
    - clickhouselint
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dupword
    - exptostd
    - intrange
    - makezero
    - mirror
    - nilnesserr
    - nosprintfhostport
    - prealloc
    - unparam
    - usestdlibvars
    - wastedassign
  exclusions:
    presets:
      - comments
    rules:
      # Allow unused parameters in interface implementations
      - linters:
          - revive
        text: "unused-parameter"
      # Allow fmt.Print* in test files
      - linters:
          - forbidigo
        path: _test\.go$
        text: "fmt\\.Print"
      # Allow fmt.Print* in CLI/main packages
      - linters:
          - forbidigo
        path: cmd/
        text: "fmt\\.Print"
      # Allow fmt.Print* in CLI packages
      - linters:
          - forbidigo
        path: cli/
        text: "fmt\\.Print"
      # Test files: allow long functions, many arguments, and goconst noise
      - linters:
          - revive
        path: _test\.go$
        text: "cyclomatic"
      - linters:
          - revive
        path: _test\.go$
        text: "argument-limit"
      - linters:
          - goconst
        path: _test\.go$
      - linters:
          - gocritic
        path: _test\.go$
        text: "rangeValCopy"
      # Allow fmt.Fprintf unchecked (logging/streaming patterns)
      - linters:
          - errcheck
        text: "fmt\\.Fprintf"
      # Allow f.Close() unchecked (deferred cleanup)
      - linters:
          - errcheck
        text: "\\.Close"
        path: _test\.go$
      # Suppress all noise in test files — they are not shipped
      - path: _test\.go$
        linters:
          - errcheck
          - unused
          - gosec
          - noctx
          - staticcheck
          - nilerr
          - unparam
          - rowserrcheck
          - unconvert
          - gocritic
          - ineffassign
          - wastedassign
          - revive
      # Suppress all issues in baml_client/ — fully generated by the BAML compiler
      - path: baml_client/
        linters:
          - errcheck
          - unused
          - staticcheck
          - unconvert
          - revive
          - gocritic
          - unparam
  settings:
    custom:
      gounslop:
        type: "module"
        settings:
          disable:
            - nospecialunicode
            - nounicodeescape
            - nofalsesharing
            - importcontrol
            - exportcontrol
            - readfriendlyorder
    forbidigo:
      forbid:
        # Ban fmt.Sprintf patterns that assemble SQL keywords — catches SQL injection attempts
        - pattern: 'fmt\.Sprintf\(.*(%[^v].*(?i)(INSERT\s+INTO|SELECT\s+.*FROM|UPDATE\s+\w+\s+SET|DELETE\s+FROM|CREATE\s+(TABLE|DATABASE|INDEX)|DROP\s+(TABLE|DATABASE|INDEX)|ALTER\s+TABLE)).*'
          msg: "DO NOT use fmt.Sprintf to assemble SQL queries. Use parameterized queries or GORM builders instead. See .agents/docs/sql-security.md"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: argument-limit
          arguments: [8]
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: indent-error-flow
        - name: import-shadowing
        - name: modifies-value-receiver
        - name: range-val-address
        - name: range-val-in-closure
        - name: receiver-naming
        - name: time-naming
        - name: unexported-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
    gosec:
      excludes:
        # G104: Errors unhandled — too many false positives
        - G104
      config:
        G101:
          pattern: "(?i)passwd|pass|password|pwd|secret|token|api_key"
        G301: "0750"
        G302: "0640"
        G306: "0640"
    gocritic:
      enabled-checks:
        - boolExprSimplify
        - commentedOutImport
        - importShadow
        - indexAlloc
        - rangeExprCopy
        - rangeValCopy
        - sprintfQuotedString
        - yodaStyleExpr
    goconst:
      min-len: 4
      min-occurrences: 10
      ignore-string-values:
        - "^(true|false|enable|enabled|disable|default|error|type|value|query|profile|text)$"
        - "^(Port|hostname|database|schema|storageUnit|table|column|path|kind|namespace|objectName)$"
        - "^(driver_id|source_type|database_type|profile_id_present|profile_source|connector)$"
        - "^(Content-Type|application/json|String|formula indicator|Database|openai-generic)$"
        - "^(bsonType|modifying|upgrading|migrating|stopping|snapshotting|rebooting cluster nodes)$"
        - "^(iamAuthEnabled|requireTLS|iamAuthSupported|serverless|transitEncryption)$"
        - "^(Connected|Error|us-central1|healthy|DATETIME|String)$"
    misspell:
      locale: US
    nakedret:
      max-func-lines: 5

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - graph/
  settings:
    goimports:
      local-prefixes:
        - github.com/clidey/whodb
