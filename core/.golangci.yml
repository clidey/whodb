version: "2"

run:
  go: "1.26.1"

linters:
  enable:
    - gounslop
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - forbidigo
    - misspell
    - unconvert
    - nakedret
    - goconst
    - sqlclosecheck
    - rowserrcheck
    - errorlint
    - nilerr
    - durationcheck
    - noctx
    - perfsprint
    - clickhouselint
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dupword
    - exptostd
    - intrange
    - makezero
    - mirror
    - nilnesserr
    - nosprintfhostport
    - prealloc
    - unparam
    - usestdlibvars
    - wastedassign
  exclusions:
    presets:
      - comments
    paths:
      - src/analytics/.*
      - third_party\.go$
    rules:
      # Allow unused parameters in interface implementations
      - linters:
          - revive
        text: "unused-parameter"
      # Allow fmt.Print* in test files
      - linters:
          - forbidigo
        path: _test\.go$
        text: "fmt\\.Print"
      # Allow fmt.Print* in CLI/main packages
      - linters:
          - forbidigo
        path: cmd/
        text: "fmt\\.Print"
      # Allow fmt.Print* in CLI packages
      - linters:
          - forbidigo
        path: cli/
        text: "fmt\\.Print"
      # Test files: allow long functions, many arguments, and goconst noise
      - linters:
          - revive
        path: _test\.go$
        text: "cyclomatic"
      - linters:
          - revive
        path: _test\.go$
        text: "argument-limit"
      - linters:
          - goconst
        path: _test\.go$
      - linters:
          - gocritic
        path: _test\.go$
        text: "rangeValCopy"
      # Allow fmt.Fprintf unchecked (logging/streaming patterns)
      - linters:
          - errcheck
        text: "fmt\\.Fprintf"
      # Allow f.Close() unchecked (deferred cleanup)
      - linters:
          - errcheck
        text: "\\.Close"
        path: _test\.go$
  settings:
    custom:
      gounslop:
        type: "module"
        settings:
          disable:
            - nospecialunicode
            - nounicodeescape
            - nofalsesharing
            - importcontrol
            - exportcontrol
            - readfriendlyorder
    forbidigo:
      forbid:
        # Ban fmt.Sprintf patterns that assemble SQL keywords — catches SQL injection attempts
        - pattern: 'fmt\.Sprintf\(.*(%[^v].*(?i)(INSERT\s+INTO|SELECT\s+.*FROM|UPDATE\s+\w+\s+SET|DELETE\s+FROM|CREATE\s+(TABLE|DATABASE|INDEX)|DROP\s+(TABLE|DATABASE|INDEX)|ALTER\s+TABLE)).*'
          msg: "DO NOT use fmt.Sprintf to assemble SQL queries. Use parameterized queries or GORM builders instead. See .agents/docs/sql-security.md"
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: package-comments
          disabled: true
        - name: cyclomatic
          arguments: [20]
        - name: argument-limit
          arguments: [8]
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: indent-error-flow
        - name: import-shadowing
        - name: modifies-value-receiver
        - name: range-val-address
        - name: range-val-in-closure
        - name: receiver-naming
        - name: time-naming
        - name: unexported-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
    gosec:
      excludes:
        # G104: Errors unhandled — too many false positives
        - G104
      config:
        G101:
          pattern: "(?i)passwd|pass|password|pwd|secret|token|api_key"
        G301: "0750"
        G302: "0640"
        G306: "0640"
    gocritic:
      enabled-checks:
        - boolExprSimplify
        - commentedOutImport
        - importShadow
        - indexAlloc
        - rangeExprCopy
        - rangeValCopy
        - sprintfQuotedString
        - yodaStyleExpr
    goconst:
      min-len: 3
      min-occurrences: 4
    misspell:
      locale: US
    nakedret:
      max-func-lines: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/clidey/whodb
