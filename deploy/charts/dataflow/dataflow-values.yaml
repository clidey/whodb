replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

session:
  ttl: 24h
  bootstrapEnabled: true

secret:
  create: true
  existingSecret: ''

runtime:
  logLevel: info
  logFormat: json

metadata:
  dsn: ''
  sessionDsn: ''

  native:
    enabled: true
    clusterName: ''
    replicas: 1
    storage: 3Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1024Mi
      requests:
        cpu: 10m
        memory: 50Mi

extraEnvs: []

ingress:
  enabled: true
  className: nginx
  hostPrefix: dataflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'

app:
  enabled: true
  namespace: app-system
  name: dataflow
  type: iframe
  displayType: hidden
  urlScheme: https
  iconPath: /favicon.svg
  hostOverride: ''
  data:
    desc: Sealos-native database workspace
  i18n:
    en:
      name: DataFlow
    zh:
      name: 数据库管理
    zh-Hans:
      name: 数据库管理

resources: {}

startupProbe:
  periodSeconds: 5
  failureThreshold: 24
  timeoutSeconds: 3

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
