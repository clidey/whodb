mutation ImportPreview($input: ImportPreviewInput!) {
  ImportPreview(input: $input) {
    Sheet
    Columns
    Rows
    Truncated
    ValidationError
    Mapping {
      SourceColumn
      TargetColumn
    }
    RequiresAllowAutoGenerated
    AutoGeneratedColumns
    NewTable {
      TableName
      Columns {
        SourceColumn
        TargetColumn
        Type
        Nullable
        Primary
        Skip
      }
      Issues {
        Key
        Field
        SourceColumn
      }
    }
  }
}
