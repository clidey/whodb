query GetAIChat($providerId: String, $modelType: String!, $token: String, $ref: SourceObjectRefInput, $previousConversation: String!, $query: String!, $model: String!) {
  AIChat(providerId: $providerId, modelType: $modelType, token: $token, ref: $ref, input: {
    PreviousConversation: $previousConversation,
    Query: $query,
    Model: $model,
  }) {
    Type
    Result {
      Columns {
        Type
        Name
        MetadataFidelity
      }
      Rows
    }
    Text
  }
}
