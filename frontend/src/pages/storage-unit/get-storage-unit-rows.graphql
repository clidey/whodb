query GetStorageUnitRows($ref: SourceObjectRefInput!, $where: WhereCondition, $sort: [SortCondition!], $pageSize: Int!, $pageOffset: Int!) {
  Row: SourceRows(ref: $ref, where: $where, sort: $sort, pageSize: $pageSize, pageOffset: $pageOffset) {
    Columns {
      Type
      Name
      MetadataFidelity
      IsPrimary
      IsForeignKey
      ReferencedTable
      ReferencedColumn
      Length
      Precision
      Scale
    }
    Rows
    DisableUpdate
      TotalCount
  }
}
