query SourceObjectCreationMetadata($parent: SourceObjectRefInput) {
  SourceObjectCreationMetadata(parent: $parent) {
    Supported
    ObjectKind
    RequiresColumns
    TypeDefinitions {
      id
      label
      hasLength
      hasPrecision
      defaultLength
      defaultPrecision
      category
    }
    ColumnCapabilities {
      Types
      Nullable
      PrimaryKey
      CompositePrimaryKey
      Unique
      Identity
      DefaultValue
      CheckValues
      CheckMinMax
      ForeignKey
    }
    ColumnLabels {
      Nullable
      PrimaryKey
      Unique
      Identity
      DefaultValue
      CheckValues
      CheckMin
      CheckMax
      ForeignKey
    }
    TableCapabilities {
      RequiresPrimaryKey
      PartitionKey
      ClusteringKey
      OrderKey
      KeyValueType
    }
    TableOptions {
      Key
      Label
      Required
      Values
    }
  }
}
