query SourceFieldConstraints($ref: SourceObjectRefInput!) {
  SourceFieldConstraints(ref: $ref) {
    Name
    Type
    Nullable
    Primary
    Unique
    Identity
    DefaultValue
    AllowedValues
    CheckMin
    CheckMax
    ForeignKey {
      Table
      Column
    }
    Length
    Precision
    Scale
  }
}
