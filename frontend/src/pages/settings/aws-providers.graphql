query GetCloudProviders {
  CloudProviders {
    ... on AWSProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      ProfileName
      DiscoverRDS
      DiscoverElastiCache
      DiscoverDocumentDB
      DiscoverS3
    }
    ... on AzureProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      SubscriptionID
      TenantID
      ResourceGroup
      DiscoverPostgreSQL
      DiscoverMySQL
      DiscoverRedis
      DiscoverCosmosDB
    }
    ... on GCPProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      ProjectID
      ServiceAccountKeyPath
      DiscoverCloudSQL
      DiscoverAlloyDB
      DiscoverMemorystore
    }
  }
}

query GetCloudProvider($id: ID!) {
  CloudProvider(id: $id) {
    ... on AWSProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      ProfileName
      DiscoverRDS
      DiscoverElastiCache
      DiscoverDocumentDB
      DiscoverS3
    }
    ... on AzureProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      SubscriptionID
      TenantID
      ResourceGroup
      DiscoverPostgreSQL
      DiscoverMySQL
      DiscoverRedis
      DiscoverCosmosDB
    }
    ... on GCPProvider {
      Id
      ProviderType
      Name
      Region
      Status
      LastDiscoveryAt
      DiscoveredCount
      Error
      ProjectID
      ServiceAccountKeyPath
      DiscoverCloudSQL
      DiscoverAlloyDB
      DiscoverMemorystore
    }
  }
}

query GetDiscoveredConnections {
  DiscoveredConnections {
    Id
    ProviderType
    ProviderID
    Name
    DatabaseType: SourceType
    Region
    Status
    Metadata {
      Key
      Value
    }
  }
}

query GetProviderConnections($providerId: ID!) {
  ProviderConnections(providerID: $providerId) {
    Id
    ProviderType
    ProviderID
    Name
    DatabaseType: SourceType
    Region
    Status
    Metadata {
      Key
      Value
    }
  }
}

query GetLocalAWSProfiles {
  LocalAWSProfiles {
    Name
    Region
    Source
    AuthType
    IsDefault
  }
}

query GetAWSRegions {
  AWSRegions {
    Id
    Description
    Partition
  }
}

mutation AddAWSProvider($input: AWSProviderInput!) {
  AddAWSProvider(input: $input) {
    Id
    ProviderType
    Name
    Region
    ProfileName
    DiscoverRDS
    DiscoverElastiCache
    DiscoverDocumentDB
    DiscoverS3
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
  }
}

mutation UpdateAWSProvider($id: ID!, $input: AWSProviderInput!) {
  UpdateAWSProvider(id: $id, input: $input) {
    Id
    ProviderType
    Name
    Region
    ProfileName
    DiscoverRDS
    DiscoverElastiCache
    DiscoverDocumentDB
    DiscoverS3
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
  }
}

mutation RemoveCloudProvider($id: ID!) {
  RemoveCloudProvider(id: $id) {
    Status
  }
}

mutation TestCloudProvider($id: ID!) {
  TestCloudProvider(id: $id)
}

mutation TestAWSCredentials($input: AWSProviderInput!) {
  TestAWSCredentials(input: $input)
}

mutation GenerateRDSAuthToken($providerID: ID!, $endpoint: String!, $port: Int!, $region: String!, $username: String!) {
  GenerateRDSAuthToken(providerID: $providerID, endpoint: $endpoint, port: $port, region: $region, username: $username)
}

