  example4: "ჩამოთვალეთ ყველა შესყიდვის შეკვეთა, რომელიც განთავსდა ბოლო კვირის განმავლობაში"
  example5: "შეაჯამეთ მთლიანი გაყიდვები რეგიონების მიხედვით ამ კვარტალში"
  example6: "აჩვენეთ შეკვეთის საშუალო ღირებულება თითოეული პროდუქტის კატეგორიისთვის"
  example7: "ჩამოთვალეთ ყველა პროდუქტი, რომელიც ამჟამად არ არის მარაგში"
  example8: "აჩვენეთ ტოპ 5 ყველაზე გაყიდვადი პროდუქტი ელექტრონიკის კატეგორიაში"
  example9: "მიუთითეთ სხვადასხვა პროდუქტების საერთო რაოდენობა თითოეულ საწყობში"
  example10: "ჩამოთვალეთ ყველა თანამშრომელი, ვინც შეუერთდა ბოლო ექვსი თვის განმავლობაში"
  example11: "მიიღეთ თანამშრომლების დემოგრაფიის შეჯამება დეპარტამენტის მიხედვით"
  example12: "აჩვენეთ საშუალო ხელფასი პროგრამული უზრუნველყოფის ინჟინრებისთვის"
  example13: "წარმოადგინეთ ხარჯების განაწილება დეპარტამენტების მიხედვით გასული ფინანსური წლისთვის"
  example14: "შეაჯამეთ მოგება-ზარალის ანგარიშგება ბოლო კვარტალში"
  example15: "აჩვენეთ გაყიდვების თითოეული არხის მიერ გენერირებული მთლიანი შემოსავალი"
  example16: "მიუთითეთ ყველა აქტიური მარკეტინგული კამპანიის სია"
  example17: "შეაჯამეთ ელ.ფოსტის კამპანიების დაწკაპუნების მაჩვენებელი ბოლო კვარტალში"
  example18: "აჩვენეთ თითოეული კამპანიის მიერ გენერირებული ლიდერების საერთო რაოდენობა"
  example19: "ჩამოთვალეთ ყველა მიმდინარე პროექტი და მათი ამჟამინდელი სტატუსი"
  example20: "მიიღეთ პროექტის ვადების და ეტაპების შეჯამება მომდევნო კვარტალში"
  example21: "აჩვენეთ ტოპ 5 პროექტი ბიუჯეტის გამოყოფის მიხედვით"
  example22: "გთავაზობთ ვებსაიტის ტრაფიკის ტენდენციის ანალიზს ბოლო ექვსი თვის განმავლობაში"
  example23: "შეაჯამეთ კონვერტაციის ტარიფები ტრაფიკის წყაროს მიხედვით"
  example24: "აჩვენეთ ყველაზე ეფექტური საკვანძო სიტყვები ჩვენს საძიებო სისტემის მარკეტინგულ კამპანიებში"
  example25: "ჩამოთვალეთ ყველა ტრანზაქცია, რომელიც მონიშნული იყო აუდიტისთვის გასულ წელს"
  example26: "შეაჯამეთ შესაბამისობის საკითხები, რომლებიც მოხსენებულია რეგიონის მიხედვით"
  example27: "აჩვენეთ ანგარიში ყველა პოლიტიკის დარღვევის შესახებ ბოლო კვარტალში"

