  example0: "සියලුම මිලදී ගැනීමේ ඇණවුම් වල සාරාංශය ලබා ගන්න"
  example1: "පසුගිය මාසයේ මිලදී ගැනීමක් කළ සියලුම පාරිභෝගිකයින් ලැයිස්තුගත කරන්න"
  example2: "මුළු වියදම් අනුව ඉහළම පාරිභෝගිකයින් 10 පෙන්වන්න"
  example3: "පසුගිය වසර සඳහා පාරිභෝගික ප්‍රතිපෝෂණ සාරාංශයක් සපයන්න"
  example4: "පසුගිය සතිය තුළ සිදු කරන ලද සියලුම මිලදී ගැනීමේ ඇණවුම් ලැයිස්තුගත කරන්න"
  example5: "මෙම කාර්තුව සඳහා කලාපය අනුව මුළු විකුණුම් සාරාංශ කරන්න"
  example6: "එක් එක් නිෂ්පාදන කාණ්ඩය සඳහා සාමාන්‍ය ඇණවුම් අගය පෙන්වන්න"
  example7: "දැනට තොග නොමැති සියලුම නිෂ්පාදන ලැයිස්තුගත කරන්න"
  example8: "ඉලෙක්ට්‍රොනික කාණ්ඩයේ හොඳම අලෙවි වන නිෂ්පාදන 5 පෙන්වන්න"
  example9: "එක් එක් ගබඩාවේ විවිධ නිෂ්පාදනවල මුළු ගණන ලබා දෙන්න"
  example10: "පසුගිය මාස හය තුළ සම්බන්ධ වූ සියලුම සේවකයින් ලැයිස්තුගත කරන්න"
  example11: "දෙපාර්තමේන්තුව අනුව සේවක ජනවිකාස පිළිබඳ සාරාංශයක් ලබා ගන්න"
  example12: "මෘදුකාංග ඉංජිනේරුවන්ගේ සාමාන්‍ය වැටුප පෙන්වන්න"
  example13: "පසුගිය මූල්‍ය වර්ෂය සඳහා දෙපාර්තමේන්තුව විසින් වියදම් බිඳවැටීමක් ලබා දෙන්න"
  example14: "පසුගිය කාර්තුව සඳහා ලාභ අලාභ ප්‍රකාශය සාරාංශ කරන්න"
  example15: "එක් එක් විකුණුම් නාලිකාව විසින් ජනනය කරන ලද මුළු ආදායම පෙන්වන්න"
  example16: "සියලුම ක්‍රියාකාරී අලෙවිකරණ ව්‍යාපාර ලැයිස්තුවක් සපයන්න"
  example17: "පසුගිය කාර්තුව සඳහා විද්‍යුත් තැපැල් ව්‍යාපාරවල ක්ලික්-හරහා ගාස්තු සාරාංශ කරන්න"
  example18: "එක් එක් ව්‍යාපාරය විසින් ජනනය කරන ලද මුළු ඊයම් ගණන පෙන්වන්න"
  example19: "දැනට පවතින සියලුම ව්‍යාපෘති සහ ඒවායේ වත්මන් තත්ත්වය ලැයිස්තුගත කරන්න"
  example20: "ඉදිරි කාර්තුව සඳහා ව්‍යාපෘති කාලසීමාවන් සහ සන්ධිස්ථානවල සාරාංශයක් ලබා ගන්න"
  example21: "අයවැය ප්‍රතිපාදන අනුව ඉහළම ව්‍යාපෘති 5 පෙන්වන්න"
  example22: "පසුගිය මාස හය සඳහා වෙබ් අඩවි ගමනාගමනය පිළිබඳ ප්‍රවණතා විශ්ලේෂණයක් සපයන්න"
  example23: "රථවාහන ප්‍රභවය අනුව පරිවර්තන අනුපාත සාරාංශ කරන්න"
  example24: "අපගේ සෙවුම් යන්ත්‍ර අලෙවිකරණ ව්‍යාපාරවල ඉහළම ක්‍රියාකාරී මූල පද පෙන්වන්න"
  example25: "පසුගිය වසරේ විගණනය සඳහා සලකුණු කළ සියලුම ගනුදෙනු ලැයිස්තුගත කරන්න"
  example26: "කලාපය විසින් වාර්තා කරන ලද අනුකූලතා ගැටළු සාරාංශ කරන්න"
  example27: "පසුගිය කාර්තුවේ සියලුම ප්‍රතිපත්ති කඩකිරීම් පිළිබඳ වාර්තාවක් පෙන්වන්න"

