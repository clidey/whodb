  example0: รับข้อมูลสรุปการสั่งซื้อทั้งหมด
  example1: แสดงรายการลูกค้าทั้งหมดที่ทำการซื้อในเดือนที่ผ่านมา
  example2: แสดงลูกค้า 10 อันดับแรกตามการใช้จ่ายทั้งหมด
  example3: จัดทำสรุปผลตอบรับของลูกค้าในปีที่ผ่านมา
  example4: แสดงรายการคำสั่งซื้อทั้งหมดที่วางไว้ภายในสัปดาห์ที่ผ่านมา
  example5: สรุปยอดขายรวมตามภูมิภาคสำหรับไตรมาสนี้
  example6: แสดงมูลค่าการสั่งซื้อเฉลี่ยของผลิตภัณฑ์แต่ละประเภท
  example7: แสดงรายการสินค้าทั้งหมดที่หมดสต๊อกในปัจจุบัน
  example8: แสดงสินค้าขายดี 5 อันดับแรกในหมวดอิเล็กทรอนิกส์
  example9: ระบุจำนวนรวมของผลิตภัณฑ์ที่แตกต่างกันในแต่ละคลังสินค้า
  example10: รายชื่อพนักงานทั้งหมดที่เข้าร่วมในช่วงหกเดือนที่ผ่านมา
  example11: รับข้อมูลสรุปข้อมูลประชากรของพนักงานแยกตามแผนก
  example12: แสดงเงินเดือนโดยเฉลี่ยสำหรับวิศวกรซอฟต์แวร์
  example13: จัดทำรายละเอียดค่าใช้จ่ายตามแผนกสำหรับปีการเงินล่าสุด
  example14: สรุปงบกำไรขาดทุนสำหรับไตรมาสสุดท้าย
  example15: แสดงรายได้รวมที่เกิดจากแต่ละช่องทางการขาย
  example16: ระบุรายการแคมเปญการตลาดที่ใช้งานอยู่ทั้งหมด
  example17: สรุปอัตราการคลิกผ่านของแคมเปญอีเมลสำหรับไตรมาสสุดท้าย
  example18: แสดงจำนวนลูกค้าเป้าหมายทั้งหมดที่สร้างโดยแต่ละแคมเปญ
  example19: แสดงรายการโครงการที่กำลังดำเนินอยู่ทั้งหมดและสถานะปัจจุบัน
  example20: รับสรุปกำหนดเวลาโครงการและเหตุการณ์สำคัญสำหรับไตรมาสถัดไป
  example21: แสดง 5 อันดับแรกของโครงการตามการจัดสรรงบประมาณ
  example22: จัดทำการวิเคราะห์แนวโน้มการเข้าชมเว็บไซต์ในช่วงหกเดือนที่ผ่านมา
  example23: สรุปอัตราการแปลงตามแหล่งที่มาของการเข้าชม
  example24: แสดงคำหลักที่มีประสิทธิภาพสูงสุดในแคมเปญการตลาดผ่านเครื่องมือค้นหาของเรา
  example25: แสดงรายการธุรกรรมทั้งหมดที่ถูกตั้งค่าสถานะสำหรับการตรวจสอบในปีที่แล้ว
  example26: สรุปประเด็นการปฏิบัติตามข้อกำหนดที่รายงานตามภูมิภาค
  example27: แสดงรายงานการละเมิดนโยบายทั้งหมดในไตรมาสสุดท้าย

