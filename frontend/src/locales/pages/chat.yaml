  example7: "በአሁኑ ጊዜ ከገበያ ውጪ የሆኑትን ሁሉንም ምርቶች ይዘርዝሩ"
  example8: "በኤሌክትሮኒክስ ምድብ ውስጥ በጣም የተሸጡ 5 ምርቶችን አሳይ"
  example9: "በእያንዳንዱ መጋዘን ውስጥ የተለያዩ ምርቶችን ጠቅላላ ብዛት ያቅርቡ"
  example10: "ባለፉት ስድስት ወራት ውስጥ የተቀላቀሉትን ሁሉንም ሰራተኞች ይዘርዝሩ"
  example11: "በመምሪያው የሰራተኛ ስነ-ሕዝብ ማጠቃለያ ያግኙ"
  example12: "ለሶፍትዌር መሐንዲሶች አማካኝ ደሞዝ አሳይ"
  example13: "ለመጨረሻው የሒሳብ ዓመት ወጪዎች በመምሪያው ዝርዝር ያቅርቡ"
  example14: "ለመጨረሻው ሩብ ዓመት ትርፍ እና ኪሳራ መግለጫን ያጠቃልሉ"
  example15: "በእያንዳንዱ የሽያጭ ሰርጥ የተገኘውን አጠቃላይ ገቢ አሳይ"
  example16: "የሁሉም ንቁ የግብይት ዘመቻዎች ዝርዝር ያቅርቡ"
  example17: "ለመጨረሻው ሩብ ጊዜ የኢሜል ዘመቻዎችን ጠቅ በማድረግ የተደረጉ ተመኖችን ያጠቃልሉ።"
  example18: "በእያንዳንዱ ዘመቻ የመነጨውን አጠቃላይ የእርሳስ ብዛት አሳይ"
  example19: "ሁሉንም በመካሄድ ላይ ያሉ ፕሮጀክቶችን እና አሁን ያሉበትን ደረጃ ይዘርዝሩ"
  example20: "ለቀጣዩ ሩብ አመት የፕሮጀክት ቀነ-ገደቦች እና ዋና ዋና ክስተቶች ማጠቃለያ ያግኙ"
  example21: "በበጀት ድልድል ምርጥ 5 ፕሮጀክቶችን አሳይ"
  example22: "ላለፉት ስድስት ወራት የድር ጣቢያ ትራፊክ አዝማሚያ ትንተና ያቅርቡ"
  example23: "የልወጣ ተመኖችን በትራፊክ ምንጭ ጠቅለል ያድርጉ"
  example24: "በእኛ የፍለጋ ሞተር ማሻሻጫ ዘመቻዎች ውስጥ ከፍተኛ አፈጻጸም ያላቸውን ቁልፍ ቃላት አሳይ"
  example25: "ባለፈው ዓመት ለኦዲት የተደረጉ ሁሉንም ግብይቶች ይዘርዝሩ"
  example26: "በክልል የተዘገበ የማክበር ጉዳዮችን ጠቅለል አድርግ"
  example27: "ባለፈው ሩብ ዓመት ውስጥ የሁሉም የመመሪያ ጥሰቶች ሪፖርት አሳይ"

