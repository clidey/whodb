  example22: پچھلے چھ مہینوں سے ویب سائٹ ٹریفک کا رجحان تجزیہ فراہم کریں۔
  example23: ٹریفک کے ذریعہ کے ذریعہ تبادلوں کی شرحوں کا خلاصہ کریں۔
  example24: ہماری سرچ انجن کی مارکیٹنگ مہمات میں اعلیٰ کارکردگی کا مظاہرہ کرنے والے مطلوبہ الفاظ دکھائیں۔
  example25: پچھلے سال میں آڈٹ کے لیے جھنڈا لگائے گئے تمام لین دین کی فہرست بنائیں
  example26: علاقے کے لحاظ سے رپورٹ کردہ تعمیل کے مسائل کا خلاصہ کریں۔
  example27: پچھلی سہ ماہی میں پالیسی کی تمام خلاف ورزیوں کی رپورٹ دکھائیں۔

