  thinking19: "ការអានគំនិតរបស់អ្នក (សីលធម៌)"
  thinking20: "ធ្វើឱ្យច្បាស់ការស្រមើស្រមៃរបស់ខ្ញុំ"
  thinking21: "កំពុងពិនិត្យមើលភាពស្រើបស្រាលរបស់ខ្ញុំ"
  thinking22: "ក្លែងធ្វើគំនិតស៊ីជម្រៅ"
  thinking23: "បញ្ចូលសៀគ្វីរបស់ខ្ញុំឡើងវិញ"
  thinking24: "ប៉ូលាដំណើរការគ្រីស្តាល់របស់ខ្ញុំ"
  example0: "ទទួលបានសេចក្តីសង្ខេបនៃការបញ្ជាទិញទាំងអស់។"
  example1: "រាយបញ្ជីអតិថិជនទាំងអស់ដែលបានទិញក្នុងខែមុន។"
  example2: "បង្ហាញអតិថិជនកំពូលទាំង 10 ដោយការចំណាយសរុប"
  example3: "ផ្តល់សេចក្តីសង្ខេបនៃមតិកែលម្អរបស់អតិថិជនសម្រាប់ឆ្នាំមុន"
  example4: "រាយការបញ្ជាទិញទាំងអស់ដែលបានដាក់ក្នុងសប្តាហ៍ចុងក្រោយ"
  example5: "សង្ខេបការលក់សរុបតាមតំបន់សម្រាប់ត្រីមាសនេះ។"
  example6: "បង្ហាញតម្លៃការបញ្ជាទិញជាមធ្យមសម្រាប់ប្រភេទផលិតផលនីមួយៗ"
  example7: "រាយផលិតផលទាំងអស់ដែលបច្ចុប្បន្នអស់ស្តុក"
  example8: "បង្ហាញផលិតផលដែលលក់ដាច់បំផុតទាំង 5 នៅក្នុងប្រភេទអេឡិចត្រូនិច"
  example9: "ផ្តល់ចំនួនសរុបនៃផលិតផលផ្សេងៗគ្នានៅក្នុងឃ្លាំងនីមួយៗ"
  example10: "រាយបញ្ជីបុគ្គលិកទាំងអស់ដែលបានចូលរួមក្នុងរយៈពេលប្រាំមួយខែចុងក្រោយនេះ។"
  example11: "ទទួលបានសេចក្តីសង្ខេបនៃប្រជាសាស្រ្តបុគ្គលិកតាមនាយកដ្ឋាន"
  example12: "បង្ហាញប្រាក់ខែជាមធ្យមសម្រាប់វិស្វករកម្មវិធី"
  example13: "ផ្តល់ការវិភាគនៃការចំណាយតាមនាយកដ្ឋានសម្រាប់ឆ្នាំហិរញ្ញវត្ថុចុងក្រោយ"
  example14: "សង្ខេបរបាយការណ៍ប្រាក់ចំណេញ និងការបាត់បង់សម្រាប់ត្រីមាសចុងក្រោយ"
  example15: "បង្ហាញប្រាក់ចំណូលសរុបដែលបង្កើតដោយបណ្តាញលក់នីមួយៗ"
  example16: "ផ្តល់បញ្ជីនៃយុទ្ធនាការទីផ្សារសកម្មទាំងអស់។"
  example17: "សង្ខេបអត្រាចុចតាមរយៈយុទ្ធនាការអ៊ីមែលសម្រាប់ត្រីមាសចុងក្រោយ"
  example18: "បង្ហាញចំនួនសរុបនៃការនាំមុខដែលបង្កើតដោយយុទ្ធនាការនីមួយៗ"
  example19: "រាយបញ្ជីគម្រោងដែលកំពុងដំណើរការទាំងអស់ និងស្ថានភាពបច្ចុប្បន្នរបស់វា។"
  example20: "ទទួល​បាន​សេចក្តី​សង្ខេប​នៃ​កាល​បរិច្ឆេទ​គម្រោង និង​ចំណុច​សំខាន់​សម្រាប់​ត្រីមាស​បន្ទាប់"
  example21: "បង្ហាញគម្រោងកំពូលទាំង 5 តាមការបែងចែកថវិកា"
  example22: "ផ្តល់ការវិភាគនិន្នាការនៃចរាចរណ៍គេហទំព័រសម្រាប់រយៈពេលប្រាំមួយខែកន្លងមក"
  example23: "សង្ខេបអត្រាបំប្លែងដោយប្រភពចរាចរណ៍"
  example24: "បង្ហាញពាក្យគន្លឹះដែលមានប្រសិទ្ធភាពខ្ពស់នៅក្នុងយុទ្ធនាការទីផ្សារម៉ាស៊ីនស្វែងរករបស់យើង។"
  example25: "រាយបញ្ជីប្រតិបត្តិការទាំងអស់ដែលបានដាក់ទង់សម្រាប់សវនកម្មក្នុងឆ្នាំចុងក្រោយ"
  example26: "សង្ខេបបញ្ហាអនុលោមតាមច្បាប់ដែលបានរាយការណ៍តាមតំបន់"
  example27: "បង្ហាញរបាយការណ៍នៃការបំពានគោលការណ៍ទាំងអស់នៅក្នុងត្រីមាសចុងក្រោយ"

