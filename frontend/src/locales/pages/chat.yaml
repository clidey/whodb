  thinking22: "ആഴത്തിലുള്ള ചിന്തയെ അനുകരിക്കുന്നു"
  thinking23: "എൻ്റെ സർക്യൂട്ടുകൾ റിവയർ ചെയ്യുന്നു"
  thinking24: "എൻ്റെ ക്രിസ്റ്റൽ പ്രൊസസർ പോളിഷ് ചെയ്യുന്നു"
  example0: "എല്ലാ വാങ്ങൽ ഓർഡറുകളുടെയും സംഗ്രഹം നേടുക"
  example1: "കഴിഞ്ഞ മാസം വാങ്ങിയ എല്ലാ ഉപഭോക്താക്കളെയും ലിസ്റ്റ് ചെയ്യുക"
  example2: "മൊത്തം ചെലവ് അനുസരിച്ച് മികച്ച 10 ഉപഭോക്താക്കളെ കാണിക്കുക"
  example3: "കഴിഞ്ഞ വർഷത്തെ ഉപഭോക്തൃ ഫീഡ്‌ബാക്കിൻ്റെ ഒരു സംഗ്രഹം നൽകുക"
  example4: "കഴിഞ്ഞ ആഴ്‌ചയ്‌ക്കുള്ളിൽ നടത്തിയ എല്ലാ പർച്ചേസ് ഓർഡറുകളും ലിസ്റ്റ് ചെയ്യുക"
  example5: "ഈ പാദത്തിൽ പ്രദേശം അനുസരിച്ച് മൊത്തം വിൽപ്പന സംഗ്രഹിക്കുക"
  example6: "ഓരോ ഉൽപ്പന്ന വിഭാഗത്തിനും ശരാശരി ഓർഡർ മൂല്യം കാണിക്കുക"
  example7: "നിലവിൽ സ്റ്റോക്കില്ലാത്ത എല്ലാ ഉൽപ്പന്നങ്ങളും ലിസ്റ്റ് ചെയ്യുക"
  example8: "ഇലക്ട്രോണിക്സ് വിഭാഗത്തിൽ ഏറ്റവും കൂടുതൽ വിറ്റഴിക്കപ്പെടുന്ന മികച്ച 5 ഉൽപ്പന്നങ്ങൾ കാണിക്കുക"
  example9: "ഓരോ വെയർഹൗസിലെയും വ്യത്യസ്ത ഉൽപ്പന്നങ്ങളുടെ ആകെ എണ്ണം നൽകുക"
  example10: "കഴിഞ്ഞ ആറ് മാസത്തിനുള്ളിൽ ചേർന്ന എല്ലാ ജീവനക്കാരെയും പട്ടികപ്പെടുത്തുക"
  example11: "വകുപ്പ് പ്രകാരം ജീവനക്കാരുടെ ജനസംഖ്യാശാസ്ത്രത്തിൻ്റെ ഒരു സംഗ്രഹം നേടുക"
  example12: "സോഫ്റ്റ്വെയർ എഞ്ചിനീയർമാരുടെ ശരാശരി ശമ്പളം കാണിക്കുക"
  example13: "കഴിഞ്ഞ സാമ്പത്തിക വർഷത്തെ ഡിപ്പാർട്ട്മെൻ്റ് പ്രകാരമുള്ള ചെലവുകളുടെ ഒരു വിവരണം നൽകുക"
  example14: "കഴിഞ്ഞ പാദത്തിലെ ലാഭനഷ്ട പ്രസ്താവന സംഗ്രഹിക്കുക"
  example15: "ഓരോ വിൽപ്പന ചാനലും സൃഷ്ടിക്കുന്ന മൊത്തം വരുമാനം കാണിക്കുക"
  example16: "എല്ലാ സജീവ മാർക്കറ്റിംഗ് കാമ്പെയ്‌നുകളുടെയും ഒരു ലിസ്റ്റ് നൽകുക"
  example17: "കഴിഞ്ഞ പാദത്തിലെ ഇമെയിൽ കാമ്പെയ്‌നുകളുടെ ക്ലിക്ക്-ത്രൂ നിരക്കുകൾ സംഗ്രഹിക്കുക"
  example18: "ഓരോ കാമ്പെയ്‌നും സൃഷ്‌ടിച്ച ലീഡുകളുടെ ആകെ എണ്ണം കാണിക്കുക"
  example19: "നടന്നുകൊണ്ടിരിക്കുന്ന എല്ലാ പ്രോജക്റ്റുകളും അവയുടെ നിലവിലെ അവസ്ഥയും പട്ടികപ്പെടുത്തുക"
