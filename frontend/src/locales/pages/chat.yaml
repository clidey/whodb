  example2: "మొత్తం ఖర్చు ద్వారా టాప్ 10 కస్టమర్‌లను చూపండి"
  example3: "గత సంవత్సరం కస్టమర్ ఫీడ్‌బ్యాక్ సారాంశాన్ని అందించండి"
  example4: "గత వారంలో చేసిన అన్ని కొనుగోలు ఆర్డర్‌లను జాబితా చేయండి"
