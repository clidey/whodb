  example19: "ਸਾਰੇ ਚੱਲ ਰਹੇ ਪ੍ਰੋਜੈਕਟਾਂ ਅਤੇ ਉਹਨਾਂ ਦੀ ਮੌਜੂਦਾ ਸਥਿਤੀ ਦੀ ਸੂਚੀ ਬਣਾਓ"
  example20: "ਅਗਲੀ ਤਿਮਾਹੀ ਲਈ ਪ੍ਰੋਜੈਕਟ ਦੀਆਂ ਅੰਤਮ ਤਾਰੀਖਾਂ ਅਤੇ ਮੀਲ ਪੱਥਰਾਂ ਦਾ ਸਾਰ ਪ੍ਰਾਪਤ ਕਰੋ"
  example21: "ਬਜਟ ਵੰਡ ਦੁਆਰਾ ਚੋਟੀ ਦੇ 5 ਪ੍ਰੋਜੈਕਟ ਦਿਖਾਓ"
  example22: "ਪਿਛਲੇ ਛੇ ਮਹੀਨਿਆਂ ਲਈ ਵੈਬਸਾਈਟ ਟ੍ਰੈਫਿਕ ਦਾ ਇੱਕ ਰੁਝਾਨ ਵਿਸ਼ਲੇਸ਼ਣ ਪ੍ਰਦਾਨ ਕਰੋ"
  example23: "ਟ੍ਰੈਫਿਕ ਸਰੋਤ ਦੁਆਰਾ ਪਰਿਵਰਤਨ ਦਰਾਂ ਨੂੰ ਸੰਖੇਪ ਕਰੋ"
  example24: "ਸਾਡੇ ਖੋਜ ਇੰਜਨ ਮਾਰਕੀਟਿੰਗ ਮੁਹਿੰਮਾਂ ਵਿੱਚ ਸਭ ਤੋਂ ਵਧੀਆ ਪ੍ਰਦਰਸ਼ਨ ਕਰਨ ਵਾਲੇ ਕੀਵਰਡ ਦਿਖਾਓ"
  example25: "ਪਿਛਲੇ ਸਾਲ ਆਡਿਟ ਲਈ ਫਲੈਗ ਕੀਤੇ ਗਏ ਸਾਰੇ ਲੈਣ-ਦੇਣ ਦੀ ਸੂਚੀ ਬਣਾਓ"
  example26: "ਖੇਤਰ ਦੁਆਰਾ ਰਿਪੋਰਟ ਕੀਤੀ ਗਈ ਪਾਲਣਾ ਸੰਬੰਧੀ ਮੁੱਦਿਆਂ ਨੂੰ ਸੰਖੇਪ ਕਰੋ"
  example27: "ਪਿਛਲੀ ਤਿਮਾਹੀ ਵਿੱਚ ਨੀਤੀ ਦੀਆਂ ਸਾਰੀਆਂ ਉਲੰਘਣਾਵਾਂ ਦੀ ਰਿਪੋਰਟ ਦਿਖਾਓ"

