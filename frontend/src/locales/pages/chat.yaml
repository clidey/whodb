  example0: "તમામ ખરીદીના ઓર્ડરનો સારાંશ મેળવો"
  example1: "છેલ્લા મહિનામાં ખરીદી કરનાર તમામ ગ્રાહકોની યાદી બનાવો"
  example2: "કુલ ખર્ચ દ્વારા ટોચના 10 ગ્રાહકોને બતાવો"
  example3: "છેલ્લા વર્ષ માટે ગ્રાહક પ્રતિસાદનો સારાંશ પ્રદાન કરો"
  example4: "છેલ્લા અઠવાડિયે કરવામાં આવેલ તમામ ખરીદીના ઓર્ડરની યાદી બનાવો"
  example5: "આ ક્વાર્ટર માટે પ્રદેશ દ્વારા કુલ વેચાણનો સારાંશ આપો"
  example6: "દરેક ઉત્પાદન શ્રેણી માટે સરેરાશ ઓર્ડર મૂલ્ય બતાવો"
  example7: "હાલમાં સ્ટોકની બહાર છે તે તમામ ઉત્પાદનોની સૂચિ બનાવો"
  example8: "ઇલેક્ટ્રોનિક્સ શ્રેણીમાં ટોચની 5 સૌથી વધુ વેચાતી પ્રોડક્ટ્સ બતાવો"
  example9: "દરેક વેરહાઉસમાં વિવિધ ઉત્પાદનોની કુલ સંખ્યા પ્રદાન કરો"
  example10: "છેલ્લા છ મહિનામાં જોડાયેલા તમામ કર્મચારીઓની યાદી બનાવો"
  example11: "વિભાગ દ્વારા કર્મચારી વસ્તી વિષયકનો સારાંશ મેળવો"
  example12: "સોફ્ટવેર એન્જિનિયરો માટે સરેરાશ પગાર બતાવો"
  example13: "છેલ્લા નાણાકીય વર્ષ માટે વિભાગ દ્વારા ખર્ચનું વિરામ પ્રદાન કરો"
  example14: "છેલ્લા ત્રિમાસિક ગાળા માટે નફો અને નુકસાન નિવેદનનો સારાંશ આપો"
  example15: "દરેક વેચાણ ચેનલ દ્વારા જનરેટ થયેલ કુલ આવક બતાવો"
  example16: "તમામ સક્રિય માર્કેટિંગ ઝુંબેશની સૂચિ પ્રદાન કરો"
  example17: "છેલ્લા ક્વાર્ટર માટે ઇમેઇલ ઝુંબેશના ક્લિક-થ્રુ દરોનો સારાંશ આપો"
  example18: "દરેક ઝુંબેશ દ્વારા જનરેટ થયેલ લીડ્સની કુલ સંખ્યા બતાવો"
  example19: "બધા ચાલુ પ્રોજેક્ટ્સ અને તેમની વર્તમાન સ્થિતિની સૂચિ બનાવો"
  example20: "આગામી ક્વાર્ટર માટે પ્રોજેક્ટની સમયમર્યાદા અને માઇલસ્ટોન્સનો સારાંશ મેળવો"
  example21: "બજેટ ફાળવણી દ્વારા ટોચના 5 પ્રોજેક્ટ્સ બતાવો"
  example22: "છેલ્લા છ મહિના માટે વેબસાઇટ ટ્રાફિકનું વલણ વિશ્લેષણ પ્રદાન કરો"
  example23: "ટ્રાફિક સ્ત્રોત દ્વારા રૂપાંતરણ દરોનો સારાંશ આપો"
  example24: "અમારા સર્ચ એન્જીન માર્કેટિંગ ઝુંબેશમાં શ્રેષ્ઠ પ્રદર્શન કરતા કીવર્ડ્સ બતાવો"
  example25: "ગયા વર્ષે ઓડિટ માટે ફ્લેગ કરાયેલા તમામ વ્યવહારોની યાદી બનાવો"
  example26: "પ્રદેશ દ્વારા નોંધાયેલા અનુપાલન મુદ્દાઓનો સારાંશ આપો"
  example27: "છેલ્લા ક્વાર્ટરમાં તમામ નીતિ ઉલ્લંઘનોનો અહેવાલ બતાવો"

