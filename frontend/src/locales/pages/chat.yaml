  example6: "ప్రతి ఉత్పత్తి వర్గానికి సగటు ఆర్డర్ విలువను చూపండి"
  example7: "ప్రస్తుతం స్టాక్ లేని అన్ని ఉత్పత్తులను జాబితా చేయండి"
  example8: "ఎలక్ట్రానిక్స్ విభాగంలో అత్యధికంగా అమ్ముడైన టాప్ 5 ఉత్పత్తులను చూపండి"
  example9: "ప్రతి గిడ్డంగిలో వివిధ ఉత్పత్తుల మొత్తం గణనను అందించండి"
  example10: "గత ఆరు నెలల్లో చేరిన ఉద్యోగులందరినీ జాబితా చేయండి"
  example11: "డిపార్ట్‌మెంట్ వారీగా ఉద్యోగుల జనాభా సారాంశాన్ని పొందండి"
  example12: "సాఫ్ట్‌వేర్ ఇంజనీర్‌లకు సగటు జీతం చూపండి"
  example13: "గత ఆర్థిక సంవత్సరానికి సంబంధించి శాఖల వారీగా ఖర్చుల విభజనను అందించండి"
  example14: "గత త్రైమాసికంలో లాభ నష్టాల ప్రకటనను సంగ్రహించండి"
  example15: "ప్రతి విక్రయ ఛానెల్ ద్వారా వచ్చే మొత్తం ఆదాయాన్ని చూపండి"
  example16: "అన్ని క్రియాశీల మార్కెటింగ్ ప్రచారాల జాబితాను అందించండి"
  example17: "గత త్రైమాసికంలో ఇమెయిల్ ప్రచారాల క్లిక్-త్రూ రేట్లను సంగ్రహించండి"
  example18: "ప్రతి ప్రచారం ద్వారా ఉత్పత్తి చేయబడిన మొత్తం లీడ్‌ల సంఖ్యను చూపండి"
  example19: "అన్ని కొనసాగుతున్న ప్రాజెక్ట్‌లు మరియు వాటి ప్రస్తుత స్థితిని జాబితా చేయండి"
  example20: "తదుపరి త్రైమాసికంలో ప్రాజెక్ట్ గడువులు మరియు మైలురాళ్ల సారాంశాన్ని పొందండి"
  example21: "బడ్జెట్ కేటాయింపు ద్వారా టాప్ 5 ప్రాజెక్ట్‌లను చూపండి"
  example22: "గత ఆరు నెలల వెబ్‌సైట్ ట్రాఫిక్ యొక్క ట్రెండ్ విశ్లేషణను అందించండి"
  example23: "ట్రాఫిక్ మూలం ద్వారా మార్పిడి రేట్లను సంగ్రహించండి"
  example24: "మా సెర్చ్ ఇంజన్ మార్కెటింగ్ ప్రచారాలలో అత్యుత్తమ పనితీరు కనబరుస్తున్న కీలకపదాలను చూపండి"
  example25: "గత సంవత్సరంలో ఆడిట్ కోసం ఫ్లాగ్ చేసిన అన్ని లావాదేవీలను జాబితా చేయండి"
  example26: "ప్రాంతం వారీగా నివేదించబడిన సమ్మతి సమస్యలను సంగ్రహించండి"
  example27: "గత త్రైమాసికంలో అన్ని విధాన ఉల్లంఘనల నివేదికను చూపండి"

