  thinking5: "ನಾನು ಹೋಗುತ್ತಿರುವಾಗ ಅದನ್ನು ರೂಪಿಸುತ್ತಿದ್ದೇನೆ (ಶ್)"
  thinking6: "ವರ್ಚುವಲ್ ಕುರಿಗಳನ್ನು ಎಣಿಸುವುದು"
  thinking7: "ಚಾನೆಲಿಂಗ್ ಐನ್ಸ್ಟೈನ್"
  thinking8: "ನನ್ನ ಅಲ್ಗಾರಿದಮ್‌ಗಳನ್ನು ಟ್ಯೂನ್ ಮಾಡಲಾಗುತ್ತಿದೆ"
  thinking9: "ಒಂದು ಬೈಟ್ ಕಾಫಿ ಕುಡಿಯುತ್ತಿದ್ದೇನೆ"
  thinking10: "ವರ್ಚುವಲ್ ಆಗಿ ವಲಯಗಳಲ್ಲಿ ರನ್ನಿಂಗ್."
  thinking11: "ಬ್ಯುಸಿಯಾಗಿರುವಂತೆ ನಟಿಸುತ್ತಿದ್ದಾರೆ"
  thinking12: "ಹಾಸ್ಯದ ಪುನರಾಗಮನವನ್ನು ಲೋಡ್ ಮಾಡಲಾಗುತ್ತಿದೆ"
  thinking13: "ಸ್ವಲ್ಪ ಬುದ್ಧಿವಂತಿಕೆಯನ್ನು ಡೌನ್‌ಲೋಡ್ ಮಾಡಲಾಗುತ್ತಿದೆ"
  thinking14: "ಕೆಲವು ಡೇಟಾ ಸ್ಟ್ಯೂ ಅನ್ನು ಬೇಯಿಸುವುದು"
  thinking15: "AI ಕೆಲಸಗಳನ್ನು ಮಾಡಲಾಗುತ್ತಿದೆ™"
  thinking16: "ಮೇನ್‌ಫ್ರೇಮ್ ಅನ್ನು ಹ್ಯಾಕ್ ಮಾಡುವುದು (ವಿನೋದಕ್ಕಾಗಿ)"
  thinking17: "ಡಿಜಿಟಲ್ ಪ್ರಪಾತಕ್ಕೆ ದಿಟ್ಟಿಸಿದೆ"
  thinking18: "ಕ್ವಾಂಟಮ್ ನಾಣ್ಯವನ್ನು ತಿರುಗಿಸುವುದು"
  thinking19: "ನಿಮ್ಮ ಮನಸ್ಸನ್ನು ಓದುವುದು (ನೈತಿಕವಾಗಿ)"
  thinking20: "ನನ್ನ ವ್ಯಂಗ್ಯವನ್ನು ತೀಕ್ಷ್ಣಗೊಳಿಸುವುದು"
  thinking21: "ನನ್ನ ವೈಬ್‌ಗಳನ್ನು ಪರಿಶೀಲಿಸಲಾಗುತ್ತಿದೆ"
  thinking22: "ಆಳವಾದ ಚಿಂತನೆಯನ್ನು ಅನುಕರಿಸುವುದು"
  thinking23: "ನನ್ನ ಸರ್ಕ್ಯೂಟ್‌ಗಳನ್ನು ರಿವೈರಿಂಗ್ ಮಾಡಲಾಗುತ್ತಿದೆ"
  thinking24: "ನನ್ನ ಕ್ರಿಸ್ಟಲ್ ಪ್ರೊಸೆಸರ್ ಅನ್ನು ಪಾಲಿಶ್ ಮಾಡಲಾಗುತ್ತಿದೆ"
  example0: "ಎಲ್ಲಾ ಖರೀದಿ ಆದೇಶಗಳ ಸಾರಾಂಶವನ್ನು ಪಡೆಯಿರಿ"
  example1: "ಕಳೆದ ತಿಂಗಳಲ್ಲಿ ಖರೀದಿ ಮಾಡಿದ ಎಲ್ಲ ಗ್ರಾಹಕರನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example2: "ಒಟ್ಟು ವೆಚ್ಚದ ಮೂಲಕ ಟಾಪ್ 10 ಗ್ರಾಹಕರನ್ನು ತೋರಿಸಿ"
  example3: "ಕಳೆದ ವರ್ಷದ ಗ್ರಾಹಕರ ಪ್ರತಿಕ್ರಿಯೆಯ ಸಾರಾಂಶವನ್ನು ಒದಗಿಸಿ"
  example4: "ಕಳೆದ ವಾರದಲ್ಲಿ ಇರಿಸಲಾದ ಎಲ್ಲಾ ಖರೀದಿ ಆರ್ಡರ್‌ಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example5: "ಈ ತ್ರೈಮಾಸಿಕದಲ್ಲಿ ಪ್ರದೇಶದ ಮೂಲಕ ಒಟ್ಟು ಮಾರಾಟವನ್ನು ಸಾರಾಂಶಗೊಳಿಸಿ"
  example6: "ಪ್ರತಿ ಉತ್ಪನ್ನ ವರ್ಗಕ್ಕೆ ಸರಾಸರಿ ಆರ್ಡರ್ ಮೌಲ್ಯವನ್ನು ತೋರಿಸಿ"
  example7: "ಪ್ರಸ್ತುತ ಸ್ಟಾಕ್ ಇಲ್ಲದ ಎಲ್ಲಾ ಉತ್ಪನ್ನಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example8: "ಎಲೆಕ್ಟ್ರಾನಿಕ್ಸ್ ವಿಭಾಗದಲ್ಲಿ ಟಾಪ್ 5 ಹೆಚ್ಚು ಮಾರಾಟವಾದ ಉತ್ಪನ್ನಗಳನ್ನು ತೋರಿಸಿ"
  example9: "ಪ್ರತಿ ಗೋದಾಮಿನಲ್ಲಿ ವಿವಿಧ ಉತ್ಪನ್ನಗಳ ಒಟ್ಟು ಎಣಿಕೆಯನ್ನು ಒದಗಿಸಿ"
  example10: "ಕಳೆದ ಆರು ತಿಂಗಳಲ್ಲಿ ಸೇರಿದ ಎಲ್ಲಾ ಉದ್ಯೋಗಿಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example11: "ಇಲಾಖೆಯ ಮೂಲಕ ಉದ್ಯೋಗಿ ಜನಸಂಖ್ಯಾಶಾಸ್ತ್ರದ ಸಾರಾಂಶವನ್ನು ಪಡೆಯಿರಿ"
  example12: "ಸಾಫ್ಟ್‌ವೇರ್ ಇಂಜಿನಿಯರ್‌ಗಳಿಗೆ ಸರಾಸರಿ ವೇತನವನ್ನು ತೋರಿಸಿ"
  example13: "ಕಳೆದ ಆರ್ಥಿಕ ವರ್ಷದಲ್ಲಿ ಇಲಾಖೆಯ ವೆಚ್ಚಗಳ ವಿವರವನ್ನು ಒದಗಿಸಿ"
  example14: "ಕಳೆದ ತ್ರೈಮಾಸಿಕದಲ್ಲಿ ಲಾಭ ಮತ್ತು ನಷ್ಟದ ಹೇಳಿಕೆಯನ್ನು ಸಾರಾಂಶಗೊಳಿಸಿ"
  example15: "ಪ್ರತಿ ಮಾರಾಟದ ಚಾನಲ್‌ನಿಂದ ಉತ್ಪತ್ತಿಯಾಗುವ ಒಟ್ಟು ಆದಾಯವನ್ನು ತೋರಿಸಿ"
  example16: "ಎಲ್ಲಾ ಸಕ್ರಿಯ ಮಾರ್ಕೆಟಿಂಗ್ ಪ್ರಚಾರಗಳ ಪಟ್ಟಿಯನ್ನು ಒದಗಿಸಿ"
  example17: "ಕಳೆದ ತ್ರೈಮಾಸಿಕದಲ್ಲಿ ಇಮೇಲ್ ಪ್ರಚಾರಗಳ ಕ್ಲಿಕ್-ಥ್ರೂ ದರಗಳನ್ನು ಸಾರಾಂಶಗೊಳಿಸಿ"
  example18: "ಪ್ರತಿ ಅಭಿಯಾನದಿಂದ ಒಟ್ಟು ಲೀಡ್‌ಗಳ ಸಂಖ್ಯೆಯನ್ನು ತೋರಿಸಿ"
  example19: "ಎಲ್ಲಾ ಚಾಲ್ತಿಯಲ್ಲಿರುವ ಯೋಜನೆಗಳು ಮತ್ತು ಅವುಗಳ ಪ್ರಸ್ತುತ ಸ್ಥಿತಿಯನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example20: "ಮುಂದಿನ ತ್ರೈಮಾಸಿಕದಲ್ಲಿ ಯೋಜನೆಯ ಗಡುವುಗಳು ಮತ್ತು ಮೈಲಿಗಲ್ಲುಗಳ ಸಾರಾಂಶವನ್ನು ಪಡೆಯಿರಿ"
  example21: "ಬಜೆಟ್ ಹಂಚಿಕೆಯ ಮೂಲಕ ಟಾಪ್ 5 ಯೋಜನೆಗಳನ್ನು ತೋರಿಸಿ"
  example22: "ಕಳೆದ ಆರು ತಿಂಗಳಿನಿಂದ ವೆಬ್‌ಸೈಟ್ ಟ್ರಾಫಿಕ್‌ನ ಟ್ರೆಂಡ್ ವಿಶ್ಲೇಷಣೆಯನ್ನು ಒದಗಿಸಿ"
  example23: "ಟ್ರಾಫಿಕ್ ಮೂಲದ ಮೂಲಕ ಪರಿವರ್ತನೆ ದರಗಳನ್ನು ಸಾರಾಂಶಗೊಳಿಸಿ"
  example24: "ನಮ್ಮ ಸರ್ಚ್ ಇಂಜಿನ್ ಮಾರ್ಕೆಟಿಂಗ್ ಪ್ರಚಾರಗಳಲ್ಲಿ ಉನ್ನತ-ಕಾರ್ಯನಿರ್ವಹಣೆಯ ಕೀವರ್ಡ್‌ಗಳನ್ನು ತೋರಿಸಿ"
  example25: "ಕಳೆದ ವರ್ಷದಲ್ಲಿ ಆಡಿಟ್‌ಗಾಗಿ ಫ್ಲ್ಯಾಗ್ ಮಾಡಲಾದ ಎಲ್ಲಾ ವಹಿವಾಟುಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ"
  example26: "ಪ್ರದೇಶದ ಮೂಲಕ ವರದಿ ಮಾಡಲಾದ ಅನುಸರಣೆ ಸಮಸ್ಯೆಗಳನ್ನು ಸಾರಾಂಶಗೊಳಿಸಿ"
  example27: "ಕಳೆದ ತ್ರೈಮಾಸಿಕದಲ್ಲಿ ಎಲ್ಲಾ ನೀತಿ ಉಲ್ಲಂಘನೆಗಳ ವರದಿಯನ್ನು ತೋರಿಸಿ"

