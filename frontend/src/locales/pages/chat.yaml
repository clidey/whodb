  thinking8: எனது அல்காரிதம்களை சரிசெய்கிறது
  thinking9: ஒரு பைட் காபி குடிப்பது
  thinking10: கிட்டத்தட்ட வட்டங்களில் இயங்குகிறது.
  thinking11: பிஸியாக இருப்பது போல் நடிக்கிறார்
  thinking12: நகைச்சுவையான மறுபிரவேசத்தை ஏற்றுகிறது
  thinking13: சில ஞானத்தைப் பதிவிறக்குகிறது
  thinking14: சில டேட்டா ஸ்டூவை சமைப்பது
  thinking15: AI விஷயங்களைச் செய்தல்™
  thinking16: மெயின்பிரேமை ஹேக்கிங் (வேடிக்கைக்காக)
  thinking17: டிஜிட்டல் படுகுழியில் வெறித்துப் பார்க்கிறது
  thinking18: குவாண்டம் நாணயத்தை புரட்டுதல்
  thinking19: உங்கள் மனதைப் படித்தல் (நெறிமுறை)
  thinking20: என் கிண்டலைக் கூர்மையாக்குகிறது
  thinking21: எனது அதிர்வுகளை சரிபார்க்கிறது
  thinking22: ஆழ்ந்த சிந்தனையை உருவகப்படுத்துதல்
  thinking23: எனது சுற்றுகளை மீண்டும் இணைக்கிறது
  thinking24: எனது படிக செயலியை மெருகூட்டுகிறது
  example0: அனைத்து கொள்முதல் ஆர்டர்களின் சுருக்கத்தைப் பெறுங்கள்
  example1: கடந்த மாதத்தில் வாங்கிய அனைத்து வாடிக்கையாளர்களையும் பட்டியலிடுங்கள்
  example2: மொத்த செலவின் அடிப்படையில் முதல் 10 வாடிக்கையாளர்களைக் காட்டு
  example3: கடந்த ஆண்டிற்கான வாடிக்கையாளர் கருத்துகளின் சுருக்கத்தை வழங்கவும்
  example4: கடந்த வாரத்தில் செய்யப்பட்ட அனைத்து கொள்முதல் ஆர்டர்களையும் பட்டியலிடுங்கள்
  example5: இந்த காலாண்டிற்கான மொத்த விற்பனையை பிராந்திய வாரியாக சுருக்கவும்
  example6: ஒவ்வொரு தயாரிப்பு வகைக்கும் சராசரி ஆர்டர் மதிப்பைக் காட்டு
  example7: தற்போது கையிருப்பில் இல்லாத அனைத்து தயாரிப்புகளையும் பட்டியலிடுங்கள்
  example8: எலக்ட்ரானிக்ஸ் பிரிவில் அதிகம் விற்பனையாகும் முதல் 5 தயாரிப்புகளைக் காட்டு
  example9: ஒவ்வொரு கிடங்கிலும் உள்ள பல்வேறு பொருட்களின் மொத்த எண்ணிக்கையை வழங்கவும்
  example10: கடந்த ஆறு மாதங்களில் சேர்ந்த அனைத்து ஊழியர்களையும் பட்டியலிடுங்கள்
  example11: துறை வாரியாக பணியாளர் புள்ளிவிவரங்களின் சுருக்கத்தைப் பெறுங்கள்
  example12: மென்பொருள் பொறியாளர்களுக்கான சராசரி சம்பளத்தைக் காட்டு
  example13: கடந்த நிதியாண்டில் துறை வாரியாக செலவினங்களின் தொகுப்பை வழங்கவும்
  example14: கடந்த காலாண்டிற்கான லாபம் மற்றும் நஷ்ட அறிக்கையை சுருக்கவும்
  example15: ஒவ்வொரு விற்பனை சேனலின் மொத்த வருவாயைக் காட்டு
  example16: அனைத்து செயலில் உள்ள சந்தைப்படுத்தல் பிரச்சாரங்களின் பட்டியலை வழங்கவும்
  example17: கடந்த காலாண்டிற்கான மின்னஞ்சல் பிரச்சாரங்களின் கிளிக்-த்ரூ விகிதங்களைச் சுருக்கவும்
  example18: ஒவ்வொரு பிரச்சாரத்திலும் உருவாக்கப்படும் மொத்த லீட்களின் எண்ணிக்கையைக் காட்டு
  example19: நடந்து கொண்டிருக்கும் திட்டங்கள் மற்றும் அவற்றின் தற்போதைய நிலையை பட்டியலிடுங்கள்
  example20: அடுத்த காலாண்டிற்கான திட்ட காலக்கெடு மற்றும் மைல்கற்களின் சுருக்கத்தைப் பெறுங்கள்
  example21: பட்ஜெட் ஒதுக்கீடு மூலம் முதல் 5 திட்டங்களைக் காட்டு
  example22: கடந்த ஆறு மாதங்களாக இணையதள போக்குவரத்தின் போக்கு பகுப்பாய்வை வழங்கவும்
  example23: போக்குவரத்து மூலத்தின் மூலம் மாற்று விகிதங்களைச் சுருக்கவும்
  example24: எங்கள் தேடுபொறி மார்க்கெட்டிங் பிரச்சாரங்களில் சிறந்த செயல்திறன் கொண்ட முக்கிய வார்த்தைகளைக் காட்டு
  example25: கடந்த ஆண்டில் தணிக்கைக்காகக் கொடியிடப்பட்ட அனைத்து பரிவர்த்தனைகளையும் பட்டியலிடுங்கள்
  example26: பிராந்தியத்தால் புகாரளிக்கப்பட்ட இணக்கச் சிக்கல்களைச் சுருக்கவும்
  example27: கடந்த காலாண்டில் நடந்த அனைத்து கொள்கை மீறல்களின் அறிக்கையையும் காட்டு

