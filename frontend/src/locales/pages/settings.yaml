kn_IN:
  title: "ಸೆಟ್ಟಿಂಗ್‌ಗಳು"
  telemetryTitle: "ಟೆಲಿಮೆಟ್ರಿ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೆಟ್ರಿಕ್ಸ್"
  telemetryDescription: "{appName} ನ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಹೆಚ್ಚಿಸಲು ನಾವು ಈ ಮಾಹಿತಿಯನ್ನು ಬಳಸುತ್ತೇವೆ."
  dataCollectionDetails: "ನಾವು ಯಾವ ಡೇಟಾವನ್ನು ಸಂಗ್ರಹಿಸುತ್ತೇವೆ, ಅದನ್ನು ಹೇಗೆ ಸಂಗ್ರಹಿಸಲಾಗುತ್ತದೆ, ಸಂಗ್ರಹಿಸಲಾಗುತ್ತದೆ ಮತ್ತು ಬಳಸಲಾಗುತ್ತದೆ ಎಂಬುದರ ಕುರಿತು ವಿವರಗಳಿಗಾಗಿ, ದಯವಿಟ್ಟು ನಮ್ಮ {privacyPolicyLink} ಅನ್ನು ಉಲ್ಲೇಖಿಸಿ."
  privacyPolicy: "ಗೌಪ್ಯತೆ ನೀತಿ"
  posthogInfo: "{appName} ಈ ಡೇಟಾವನ್ನು ಸಂಗ್ರಹಿಸಲು ಮತ್ತು ನಿರ್ವಹಿಸಲು ಪೋಸ್ಟ್‌ಹಾಗ್ ಅನ್ನು ಬಳಸುತ್ತದೆ. ಈ ಉಪಕರಣದ ಕುರಿತು ಹೆಚ್ಚಿನ ಮಾಹಿತಿಯನ್ನು ಅದರ ಗಿಥಬ್‌ನಲ್ಲಿ ಕಾಣಬಹುದು."
  sensitiveDataInfo: "ನಾವು ಸಾಧ್ಯವಾದಷ್ಟು ಸೂಕ್ಷ್ಮ ಮಾಹಿತಿಯನ್ನು ಮರುರೂಪಿಸಲು ಕ್ರಮಗಳನ್ನು ತೆಗೆದುಕೊಂಡಿದ್ದೇವೆ ಮತ್ತು ಯಾವುದನ್ನೂ ತ್ಯಾಗ ಮಾಡದೆ ಅದು ನಿಮ್ಮ ಮತ್ತು ನಮ್ಮ ಅಗತ್ಯಗಳಿಗೆ ಸರಿಹೊಂದುತ್ತದೆ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಲು ನಿರಂತರವಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುತ್ತೇವೆ."
  contactUsInfo: "ನಮಗೆ ಉತ್ತಮವಾಗಿ ಸೇವೆ ಸಲ್ಲಿಸುವ ಸಾಧನದ ಬಗ್ಗೆ ನಿಮಗೆ ತಿಳಿದಿದ್ದರೆ, ನಿಮ್ಮಿಂದ ಕೇಳಲು ನಾವು ಇಷ್ಟಪಡುತ್ತೇವೆ! ಪರದೆಯ ಕೆಳಗಿನ ಎಡ ಮೂಲೆಯಲ್ಲಿರುವ \"ನಮ್ಮನ್ನು ಸಂಪರ್ಕಿಸಿ\" ಆಯ್ಕೆಯ ಮೂಲಕ ತಲುಪಿ."
  enableTelemetry: "ಟೆಲಿಮೆಟ್ರಿಯನ್ನು ಸಕ್ರಿಯಗೊಳಿಸಲಾಗಿದೆ"
  disableTelemetry: "ಟೆಲಿಮೆಟ್ರಿಯನ್ನು ನಿಷ್ಕ್ರಿಯಗೊಳಿಸಲಾಗಿದೆ"
  eeNoTelemetry: "{appName} ಎಂಟರ್‌ಪ್ರೈಸ್ ಟೆಲಿಮೆಟ್ರಿ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೆಟ್ರಿಕ್‌ಗಳನ್ನು ಸಂಗ್ರಹಿಸುವುದಿಲ್ಲ."
