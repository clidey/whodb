ml_IN:
  title: "ക്രമീകരണങ്ങൾ"
  telemetryTitle: "ടെലിമെട്രി, പെർഫോമൻസ് മെട്രിക്‌സ്"
  telemetryDescription: "{appName} എന്നതിൻ്റെ പ്രകടനം മെച്ചപ്പെടുത്താൻ മാത്രമാണ് ഞങ്ങൾ ഈ വിവരങ്ങൾ ഉപയോഗിക്കുന്നത്."
  dataCollectionDetails: "ഞങ്ങൾ ഏത് ഡാറ്റയാണ് ശേഖരിക്കുന്നത്, അത് എങ്ങനെ ശേഖരിക്കുന്നു, സംഭരിക്കുന്നു, ഉപയോഗിക്കുന്നു എന്നതിനെക്കുറിച്ചുള്ള വിശദാംശങ്ങൾക്ക്, ദയവായി ഞങ്ങളുടെ {privacyPolicyLink} കാണുക."
  privacyPolicy: "സ്വകാര്യതാ നയം"
  posthogInfo: "ഈ ഡാറ്റ ശേഖരിക്കാനും നിയന്ത്രിക്കാനും {appName} Posthog ഉപയോഗിക്കുന്നു. ഈ ടൂളിനെക്കുറിച്ചുള്ള കൂടുതൽ വിവരങ്ങൾ അതിൻ്റെ Github-ൽ കാണാം."
  sensitiveDataInfo: "ഞങ്ങൾക്ക് കഴിയുന്നത്ര തന്ത്രപ്രധാനമായ വിവരങ്ങൾ തിരുത്താൻ ഞങ്ങൾ നടപടികൾ സ്വീകരിച്ചിട്ടുണ്ട്, അത് നിങ്ങളുടെ ആവശ്യങ്ങൾക്കും ഞങ്ങളുടെ ആവശ്യങ്ങൾക്കും യോജിച്ചതാണെന്ന് ഉറപ്പുവരുത്താൻ തുടർച്ചയായി വിലയിരുത്തും."
  contactUsInfo: "ഞങ്ങൾക്ക് മികച്ച സേവനം നൽകുന്ന ഒരു ഉപകരണത്തെക്കുറിച്ച് നിങ്ങൾക്ക് അറിയാമെങ്കിൽ, നിങ്ങളിൽ നിന്ന് കേൾക്കാൻ ഞങ്ങൾ ആഗ്രഹിക്കുന്നു! സ്‌ക്രീനിൻ്റെ താഴെ ഇടത് കോണിലുള്ള \"ഞങ്ങളെ ബന്ധപ്പെടുക\" ഓപ്ഷൻ വഴി ബന്ധപ്പെടുക."
  enableTelemetry: "ടെലിമെട്രി പ്രവർത്തനക്ഷമമാക്കി"
