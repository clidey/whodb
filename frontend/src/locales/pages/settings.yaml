  telemetryDescription: "మేము {appName} పనితీరును మెరుగుపరచడానికి మాత్రమే ఈ సమాచారాన్ని ఉపయోగిస్తాము."
  dataCollectionDetails: "మేము ఏ డేటాను సేకరిస్తాము, అది ఎలా సేకరించబడుతుంది, నిల్వ చేయబడుతుంది మరియు ఉపయోగించబడుతుంది అనే వివరాల కోసం, దయచేసి మా {privacyPolicyLink}ని చూడండి."
