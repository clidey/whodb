  sensitiveDataInfo: "ਅਸੀਂ ਵੱਧ ਤੋਂ ਵੱਧ ਸੰਵੇਦਨਸ਼ੀਲ ਜਾਣਕਾਰੀ ਨੂੰ ਸੋਧਣ ਲਈ ਉਪਾਅ ਕੀਤੇ ਹਨ ਅਤੇ ਅਸੀਂ ਇਹ ਯਕੀਨੀ ਬਣਾਉਣ ਲਈ ਨਿਰੰਤਰ ਮੁਲਾਂਕਣ ਕਰਾਂਗੇ ਕਿ ਇਹ ਕਿਸੇ ਵੀ ਚੀਜ਼ ਦੀ ਕੁਰਬਾਨੀ ਦਿੱਤੇ ਬਿਨਾਂ ਤੁਹਾਡੀਆਂ ਅਤੇ ਸਾਡੀਆਂ ਜ਼ਰੂਰਤਾਂ ਦੇ ਅਨੁਕੂਲ ਹੈ।"
  contactUsInfo: "ਜੇ ਤੁਸੀਂ ਕਿਸੇ ਅਜਿਹੇ ਸਾਧਨ ਬਾਰੇ ਜਾਣਦੇ ਹੋ ਜੋ ਸਾਡੀ ਬਿਹਤਰ ਸੇਵਾ ਕਰ ਸਕਦਾ ਹੈ, ਤਾਂ ਅਸੀਂ ਤੁਹਾਡੇ ਤੋਂ ਸੁਣਨਾ ਪਸੰਦ ਕਰਾਂਗੇ! ਸਕ੍ਰੀਨ ਦੇ ਹੇਠਲੇ ਖੱਬੇ ਕੋਨੇ ਵਿੱਚ \"ਸਾਡੇ ਨਾਲ ਸੰਪਰਕ ਕਰੋ\" ਵਿਕਲਪ ਰਾਹੀਂ ਬੱਸ ਪਹੁੰਚੋ।"
