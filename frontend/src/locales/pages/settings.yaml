  dataCollectionDetails: "අප රැස් කරන දත්ත මොනවාද, එය රැස් කරන්නේ කෙසේද, ගබඩා කරන්නේ කෙසේද සහ භාවිතා කරන්නේ කෙසේද යන්න පිළිබඳ විස්තර සඳහා කරුණාකර අපගේ {privacyPolicyLink} වෙත යොමු වන්න."
