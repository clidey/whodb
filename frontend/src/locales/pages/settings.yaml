  contactUsInfo: "Εάν γνωρίζετε κάποιο εργαλείο που θα μπορούσε να μας εξυπηρετήσει καλύτερα, θα θέλαμε να σας ακούσουμε! Απλώς επικοινωνήστε μέσω της επιλογής \"Επικοινωνήστε μαζί μας\" στην κάτω αριστερή γωνία της οθόνης."
