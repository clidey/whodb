  contactUsInfo: "අපට වඩා හොඳින් සේවය කළ හැකි මෙවලමක් ගැන ඔබ දන්නේ නම්, අපි ඔබෙන් ඇසීමට කැමැත්තෙමු! තිරයේ පහළ වම් කෙළවරේ ඇති \"අප අමතන්න\" විකල්පය හරහා ළඟා වන්න."
