  telemetryDescription: "ਅਸੀਂ ਇਸ ਜਾਣਕਾਰੀ ਦੀ ਵਰਤੋਂ ਸਿਰਫ਼ {appName} ਦੀ ਕਾਰਗੁਜ਼ਾਰੀ ਨੂੰ ਵਧਾਉਣ ਲਈ ਕਰਦੇ ਹਾਂ।"
  dataCollectionDetails: "ਅਸੀਂ ਕਿਹੜਾ ਡੇਟਾ ਇਕੱਠਾ ਕਰਦੇ ਹਾਂ, ਇਸ ਨੂੰ ਕਿਵੇਂ ਇਕੱਠਾ ਕੀਤਾ, ਸਟੋਰ ਕੀਤਾ ਅਤੇ ਵਰਤਿਆ ਜਾਂਦਾ ਹੈ, ਇਸ ਬਾਰੇ ਵੇਰਵਿਆਂ ਲਈ, ਕਿਰਪਾ ਕਰਕੇ ਸਾਡੇ {privacyPolicyLink} ਨੂੰ ਵੇਖੋ।"
