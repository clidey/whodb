  sensitiveDataInfo: "మేము చేయగలిగినంత ఎక్కువ సున్నితమైన సమాచారాన్ని సరిదిద్దడానికి మేము చర్యలు తీసుకున్నాము మరియు దేనినీ త్యాగం చేయకుండా అది మీకు మరియు మా అవసరాలకు సరిపోతుందని నిర్ధారించుకోవడానికి నిరంతరం మూల్యాంకనం చేస్తాము."
  contactUsInfo: "మాకు మెరుగైన సేవలందించే సాధనం గురించి మీకు తెలిస్తే, మేము మీ నుండి వినడానికి ఇష్టపడతాము! స్క్రీన్ దిగువ ఎడమ మూలలో ఉన్న \"మమ్మల్ని సంప్రదించండి\" ఎంపిక ద్వారా చేరుకోండి."
