  accept: "Håll aktiverat"
  decline: "Inaktivera telemetri"

zh_CN:
  title: "遥测已启用"
  message: "我们通过 PostHog 收集匿名使用分析、经过编辑的会话重播和错误报告，以保持 {appName} 快速可靠。 您可以立即或随时从“设置”中关闭此功能。"
  accept: "保持启用状态"
  decline: "禁用遥测"

zh_TW:
  title: "Telemetry Is Enabled"
  message: "我們透過 PostHog 收集匿名使用分析、經過編輯的會話重播和錯誤報告，以保持 {appName} 快速可靠。 您可以立即或隨時從「設定」關閉此功能。"
  accept: "Keep Enabled"
  decline: "Disable Telemetry"

bg_BG:
  title: "Телеметрията е активирана"
  message: "Събираме анонимни анализи на употребата, редактирано повторение на сесията и доклади за грешки чрез PostHog, за да поддържаме {appName} бързи и надеждни. Можете да изключите това сега или по всяко време от Настройки."
