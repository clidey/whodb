name: Release CE

# Release workflow for WhoDB Community Edition
#
# Triggers:
#   - Push to release branch (e.g., merging main → release)
#   - Manual workflow_dispatch
#
# Modes:
#   - stage-only: Deploys to edge/draft channels (for testing)
#   - production: Deploys to stable/production channels (for users)
#
# Store Selection:
#   - Works in BOTH modes - select which stores to deploy to
#   - Can deploy to all stores or just specific ones
#   - Stage deploys to: Docker (tag only), Snap (edge), MS Store (draft), Apple (TestFlight)
#   - Production deploys to: Docker (latest), Snap (stable), MS Store (prod), Apple (App Store)
#
# Artifact contract:
#   - frontend-build-ce feeds all CE platform builds
#   - snap-package-amd64/snap-package-arm64 feed Snap deploy, signing, and release assets
#   - desktop-windows-amd64 feeds Microsoft packaging and release assets
#   - windows-msix feeds release assets after Microsoft packaging
#   - desktop-darwin-dmg feeds Apple signing and release assets
#   - desktop-darwin-mas-app feeds Apple deploy/signing
#   - server-binaries-ce feeds Linux terminal release assets
#   - cli-binaries feeds npm deploy and release assets
#   - signatures feeds release assets

on:
  push:
    branches: [ release ]
  workflow_dispatch:
    inputs:
      deployment-mode:
        description: 'Deployment Mode'
        required: true
        type: choice
        default: 'stage-only'
        options:
          - 'stage-only'     # Deploy selected stores to edge/draft channels
          - 'production'     # Deploy selected stores to stable/production channels
      version-bump:
        description: 'Version Bump Type (ignored if explicit version is set)'
        required: true
        type: choice
        default: 'minor'
        options:
          - 'major'          # 1.0.0 -> 2.0.0
          - 'minor'          # 0.61.0 -> 0.62.0
          - 'patch'          # 0.61.0 -> 0.61.1
          - 'current'        # Use current version (rebuild without increment)
      explicit-version:
        description: 'Explicit Version (e.g., 0.65.0) - overrides version bump'
        required: false
        type: string
        default: ''
      # Store selection (applies to both stage and production modes)
      deploy-docker:
        description: 'Deploy to Docker Hub'
        required: false
        type: boolean
        default: false
      deploy-snap:
        description: 'Deploy to Snap Store'
        required: false
        type: boolean
        default: false
      deploy-microsoft:
        description: 'Deploy to Microsoft Store'
        required: false
        type: boolean
        default: false
      deploy-apple:
        description: 'Deploy to Apple App Store'
        required: false
        type: boolean
        default: false
      deploy-linux-terminal:
        description: 'Build Linux terminal binaries (amd64, arm64, riscv64, armv6, armv7)'
        required: false
        type: boolean
        default: false
      deploy-cli:
        description: 'Build CLI binaries (all platforms)'
        required: false
        type: boolean
        default: false
      deploy-npm:
        description: 'Publish to npm registry (@clidey/whodb-cli)'
        required: false
        type: boolean
        default: false
      publish-github-release:
        description: 'Publish GitHub release to production (leave unchecked to keep as draft)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-ce
  cancel-in-progress: false

jobs:
  # Calculate version and deployment parameters
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      version: ${{ steps.calc.outputs.version }}
      previous-version: ${{ steps.calc.outputs.previous-version }}
      deployment-mode: ${{ steps.calc.outputs.deployment-mode }}
      stage-only: ${{ steps.calc.outputs.stage-only }}
      deploy-docker: ${{ steps.calc.outputs.deploy-docker }}
      deploy-snap: ${{ steps.calc.outputs.deploy-snap }}
      deploy-microsoft: ${{ steps.calc.outputs.deploy-microsoft }}
      deploy-apple: ${{ steps.calc.outputs.deploy-apple }}
      deploy-linux-terminal: ${{ steps.calc.outputs.deploy-linux-terminal }}
      deploy-cli: ${{ steps.calc.outputs.deploy-cli }}
      deploy-npm: ${{ steps.calc.outputs.deploy-npm }}
      publish-github-release: ${{ steps.calc.outputs.publish-github-release }}
      has-file-assets: ${{ steps.release_flags.outputs.has-file-assets }}
      release-notes: ${{ steps.release_notes.outputs.notes }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Determine deployment mode and version bump
        id: deployment_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.deployment-mode }}"
            VERSION_BUMP="${{ inputs.version-bump || 'minor' }}"
          else
            # Push to release branch triggers production with minor bump
            MODE="production"
            VERSION_BUMP="minor"
          fi
          {
            echo "mode=$MODE"
            echo "version_bump=$VERSION_BUMP"
          } >> "$GITHUB_OUTPUT"

      - name: Calculate version and parameters
        id: calc
        uses: ./.github/actions/calculate-version
        with:
          deployment-mode: ${{ steps.deployment_mode.outputs.mode }}
          version-bump: ${{ steps.deployment_mode.outputs.version_bump }}
          explicit-version: ${{ inputs.explicit-version }}
          deploy-docker: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-docker && 'true' || 'false') }}
          deploy-snap: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-snap && 'true' || 'false') }}
          deploy-microsoft: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-microsoft && 'true' || 'false') }}
          deploy-apple: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-apple && 'true' || 'false') }}
          deploy-linux-terminal: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-linux-terminal && 'true' || 'false') }}
          deploy-cli: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-cli && 'true' || 'false') }}
          deploy-npm: ${{ github.event_name == 'push' && 'true' || (inputs.deploy-npm && 'true' || 'false') }}
          publish-github-release: ${{ github.event_name == 'push' && 'true' || (inputs.publish-github-release && 'true' || 'false') }}

      - name: Validate release target selection
        id: release_flags
        env:
          DEPLOY_DOCKER: ${{ steps.calc.outputs.deploy-docker }}
          DEPLOY_SNAP: ${{ steps.calc.outputs.deploy-snap }}
          DEPLOY_MICROSOFT: ${{ steps.calc.outputs.deploy-microsoft }}
          DEPLOY_APPLE: ${{ steps.calc.outputs.deploy-apple }}
          DEPLOY_LINUX_TERMINAL: ${{ steps.calc.outputs.deploy-linux-terminal }}
          DEPLOY_CLI: ${{ steps.calc.outputs.deploy-cli }}
          DEPLOY_NPM: ${{ steps.calc.outputs.deploy-npm }}
        run: |
          set -euo pipefail

          HAS_FILE_ASSETS=false
          if [ "$DEPLOY_SNAP" = "true" ] || [ "$DEPLOY_MICROSOFT" = "true" ] || [ "$DEPLOY_APPLE" = "true" ] || [ "$DEPLOY_LINUX_TERMINAL" = "true" ] || [ "$DEPLOY_CLI" = "true" ] || [ "$DEPLOY_NPM" = "true" ]; then
            HAS_FILE_ASSETS=true
          fi

          if [ "$DEPLOY_DOCKER" != "true" ] && [ "$HAS_FILE_ASSETS" != "true" ]; then
            echo "::error::Select at least one release target: Docker, Snap, Microsoft, Apple, Linux Terminal, CLI, or npm."
            exit 1
          fi

          echo "has-file-assets=$HAS_FILE_ASSETS" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from PR
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=""

          if [ "${{ github.event_name }}" = "push" ]; then
            # Find the PR that was merged from this push by looking at the commit
            PR_NUMBER=$(gh pr list --state merged --base release --limit 1 --json number --jq '.[0].number // empty')
            if [ -n "$PR_NUMBER" ]; then
              echo "Extracting release notes from PR #$PR_NUMBER..."
              NOTES=$(gh pr view "$PR_NUMBER" --json body --jq '.body // empty')
              if [ -n "$NOTES" ]; then
                echo "Found release notes from PR description"
              fi
            fi
          fi

          # Default if no notes found
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements."
            echo "Using default release notes"
          fi

          # Output using heredoc for multiline support
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Display configuration
        run: |
          {
          echo "# 🎯 Release Configuration"
          echo ""
          echo "| Parameter | Value |"
          echo "|-----------|-------|"
          echo "| **Version** | ${{ steps.calc.outputs.version }} |"
          echo "| **Mode** | ${{ steps.calc.outputs.deployment-mode }} |"
          echo "| **Stage Only** | ${{ steps.calc.outputs.stage-only }} |"
          echo "| **Publish GitHub Release** | ${{ steps.calc.outputs.publish-github-release }} |"
          echo ""
          echo "## Deployment Targets"

          MODE="${{ steps.calc.outputs.deployment-mode }}"
          if [ "$MODE" = "production" ]; then
            echo "| Store | Deploy | Channel |"
            echo "|-------|--------|---------|"
            echo "| Docker Hub | ${{ steps.calc.outputs.deploy-docker }} | latest |"
            echo "| Snap Store | ${{ steps.calc.outputs.deploy-snap }} | stable |"
            echo "| Microsoft Store | ${{ steps.calc.outputs.deploy-microsoft }} | production |"
            echo "| Apple App Store | ${{ steps.calc.outputs.deploy-apple }} | App Store |"
          else
            echo "| Store | Deploy | Channel |"
            echo "|-------|--------|---------|"
            echo "| Docker Hub | ${{ steps.calc.outputs.deploy-docker }} | version tag |"
            echo "| Snap Store | ${{ steps.calc.outputs.deploy-snap }} | edge |"
            echo "| Microsoft Store | ${{ steps.calc.outputs.deploy-microsoft }} | draft |"
            echo "| Apple App Store | ${{ steps.calc.outputs.deploy-apple }} | TestFlight |"
          fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Build frontend once for all CE platform builds
  build-frontend:
    name: Build Frontend
    needs: [ calculate-version ]
    permissions:
      contents: read
    uses: ./.github/workflows/_build-frontend.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  # Build selected platform artifacts in parallel
  build-docker:
    name: Build Docker
    needs: [ calculate-version, build-frontend ]
    if: needs.calculate-version.outputs.deploy-docker == 'true'
    permissions:
      contents: read
      actions: write
      security-events: write
    uses: ./.github/workflows/_build-docker.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  build-windows:
    name: Build Windows
    needs: [ calculate-version, build-frontend ]
    if: needs.calculate-version.outputs.deploy-microsoft == 'true'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build-windows.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      platforms: 'windows-amd64,windows-arm64'
    secrets: inherit

  build-apple:
    name: Build Apple
    needs: [ calculate-version, build-frontend ]
    if: needs.calculate-version.outputs.deploy-apple == 'true'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build-apple.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  build-snap:
    name: Build Snap
    needs: [ calculate-version, build-frontend ]
    if: needs.calculate-version.outputs.deploy-snap == 'true'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build-snap.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  build-linux-terminal:
    name: Build Linux Terminal
    needs: [ calculate-version, build-frontend ]
    if: needs.calculate-version.outputs.deploy-linux-terminal == 'true'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build-linux-terminal.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  build-cli:
    name: Build CLI
    needs: [ calculate-version ]
    if: needs.calculate-version.outputs.deploy-cli == 'true' || needs.calculate-version.outputs.deploy-npm == 'true'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_build-cli.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  build-docker-cli:
    name: Build CLI Docker
    needs: [ calculate-version ]
    if: needs.calculate-version.outputs.deploy-docker == 'true'
    permissions:
      contents: read
      actions: write
      security-events: write
    uses: ./.github/workflows/_build-docker-cli.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
    secrets: inherit

  # Sign and validate selected artifacts
  sign-and-validate:
    name: Sign and Validate
    needs: [ calculate-version, build-docker, build-docker-cli, build-windows, build-apple, build-snap, build-linux-terminal, build-cli ]
    if: |
      always() &&
      needs.calculate-version.result == 'success' &&
      needs.calculate-version.outputs.has-file-assets == 'true' &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped' || needs.build-docker.result == 'failure') &&
      (needs.build-docker-cli.result == 'success' || needs.build-docker-cli.result == 'skipped' || needs.build-docker-cli.result == 'failure') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped' || needs.build-windows.result == 'failure') &&
      (needs.build-apple.result == 'success' || needs.build-apple.result == 'skipped' || needs.build-apple.result == 'failure') &&
      (needs.build-snap.result == 'success' || needs.build-snap.result == 'skipped' || needs.build-snap.result == 'failure') &&
      (needs.build-linux-terminal.result == 'success' || needs.build-linux-terminal.result == 'skipped' || needs.build-linux-terminal.result == 'failure') &&
      (needs.build-cli.result == 'success' || needs.build-cli.result == 'skipped' || needs.build-cli.result == 'failure')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_sign-validate.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      validate-snap: ${{ needs.build-snap.result == 'success' }}
      validate-desktop: ${{ needs.build-windows.result == 'success' || needs.build-apple.result == 'success' }}
      validate-windows: ${{ needs.build-windows.result == 'success' }}
      validate-apple: ${{ needs.build-apple.result == 'success' }}
      validate-linux-terminal: ${{ needs.build-linux-terminal.result == 'success' }}

  # Final GitHub release gate after selected builds and deploys succeed
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [
      calculate-version,
      build-docker,
      build-docker-cli,
      build-windows,
      build-apple,
      build-snap,
      build-linux-terminal,
      build-cli,
      sign-and-validate,
      deploy-docker,
      deploy-docker-cli,
      deploy-snap,
      deploy-microsoft,
      deploy-apple,
      deploy-npm
    ]
    if: |
      always() &&
      needs.calculate-version.result == 'success' &&
      (
        (needs.calculate-version.outputs.has-file-assets == 'true' && needs.sign-and-validate.result == 'success') ||
        (needs.calculate-version.outputs.has-file-assets != 'true' && needs.sign-and-validate.result == 'skipped')
      ) &&
      (needs.calculate-version.outputs.deploy-docker != 'true' || needs.build-docker.result == 'success') &&
      (needs.calculate-version.outputs.deploy-docker != 'true' || needs.build-docker-cli.result == 'success') &&
      (needs.calculate-version.outputs.deploy-snap != 'true' || needs.build-snap.result == 'success') &&
      (needs.calculate-version.outputs.deploy-microsoft != 'true' || needs.build-windows.result == 'success') &&
      (needs.calculate-version.outputs.deploy-apple != 'true' || needs.build-apple.result == 'success') &&
      (needs.calculate-version.outputs.deploy-linux-terminal != 'true' || needs.build-linux-terminal.result == 'success') &&
      (needs.calculate-version.outputs.deploy-cli != 'true' || needs.build-cli.result == 'success') &&
      (needs.calculate-version.outputs.deploy-docker != 'true' || needs.deploy-docker.result == 'success') &&
      (needs.calculate-version.outputs.deploy-docker != 'true' || needs.deploy-docker-cli.result == 'success') &&
      (needs.calculate-version.outputs.deploy-snap != 'true' || needs.deploy-snap.result == 'success') &&
      (needs.calculate-version.outputs.deploy-microsoft != 'true' || needs.deploy-microsoft.result == 'success') &&
      (needs.calculate-version.outputs.deploy-apple != 'true' || needs.deploy-apple.result == 'success') &&
      (needs.calculate-version.outputs.deploy-npm != 'true' || needs.deploy-npm.result == 'success')
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            deb.debian.org:443
            deb.debian.org:80
            github.com:443
            uploads.github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Download Snap amd64 package
        if: needs.calculate-version.outputs.deploy-snap == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-amd64
          path: artifacts/snap-package-amd64/

      - name: Download Snap arm64 package
        if: needs.calculate-version.outputs.deploy-snap == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-arm64
          path: artifacts/snap-package-arm64/

      - name: Download Windows executable
        if: needs.calculate-version.outputs.deploy-microsoft == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-windows-amd64
          path: artifacts/desktop-windows-amd64/

      - name: Download Windows MSIX bundle
        if: needs.calculate-version.outputs.deploy-microsoft == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: windows-msix
          path: artifacts/windows-msix/

      - name: Download macOS DMG
        if: needs.calculate-version.outputs.deploy-apple == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-darwin-dmg
          path: artifacts/desktop-darwin-dmg/

      - name: Download Linux server binaries
        if: needs.calculate-version.outputs.deploy-linux-terminal == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: server-binaries-ce
          path: artifacts/server-binaries-ce/

      - name: Download CLI binaries
        if: needs.calculate-version.outputs.deploy-cli == 'true' || needs.calculate-version.outputs.deploy-npm == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: cli-binaries
          path: artifacts/cli-binaries/

      - name: Download signatures
        if: needs.calculate-version.outputs.has-file-assets == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: signatures
          path: artifacts/signatures/

      - name: Prepare release assets
        env:
          DEPLOY_SNAP: ${{ needs.calculate-version.outputs.deploy-snap }}
          DEPLOY_MICROSOFT: ${{ needs.calculate-version.outputs.deploy-microsoft }}
          DEPLOY_APPLE: ${{ needs.calculate-version.outputs.deploy-apple }}
          DEPLOY_LINUX_TERMINAL: ${{ needs.calculate-version.outputs.deploy-linux-terminal }}
          DEPLOY_CLI: ${{ needs.calculate-version.outputs.deploy-cli }}
          DEPLOY_NPM: ${{ needs.calculate-version.outputs.deploy-npm }}
          HAS_FILE_ASSETS: ${{ needs.calculate-version.outputs.has-file-assets }}
        run: |
          set -euo pipefail

          mkdir -p final-assets

          copy_release_assets() {
            local description="$1"
            local source_dir="$2"
            local min_count="$3"
            shift 3
            local count

            if [ ! -d "$source_dir" ]; then
              echo "::error::Missing ${description}: artifact directory ${source_dir} was not downloaded"
              exit 1
            fi

            count=$(find "$source_dir" "$@" -type f | wc -l | tr -d ' ')
            if [ "$count" -lt "$min_count" ]; then
              echo "::error::Missing ${description}: expected at least ${min_count}, found ${count}"
              exit 1
            fi

            find "$source_dir" "$@" -type f -exec cp {} final-assets/ \;
            echo "✅ Staged ${description}: copied ${count}"
          }

          if [ "$DEPLOY_SNAP" = "true" ]; then
            copy_release_assets "Snap amd64 package" "artifacts/snap-package-amd64" 1 -name "*.snap"
            copy_release_assets "Snap arm64 package" "artifacts/snap-package-arm64" 1 -name "*.snap"
          fi

          if [ "$DEPLOY_MICROSOFT" = "true" ]; then
            copy_release_assets "Windows executable" "artifacts/desktop-windows-amd64" 1 -name "*.exe"
            copy_release_assets "Windows MSIX bundle" "artifacts/windows-msix" 1 -name "*.msixbundle"
          fi

          if [ "$DEPLOY_APPLE" = "true" ]; then
            copy_release_assets "macOS DMG" "artifacts/desktop-darwin-dmg" 1 -name "*.dmg"
          fi

          if [ "$DEPLOY_LINUX_TERMINAL" = "true" ]; then
            copy_release_assets "Linux server binaries" "artifacts/server-binaries-ce" 1 -name "whodb-*-linux-*"
          fi

          if [ "$DEPLOY_CLI" = "true" ] || [ "$DEPLOY_NPM" = "true" ]; then
            copy_release_assets "CLI binaries" "artifacts/cli-binaries" 1 -name "whodb-cli-*"
          fi

          if [ "$HAS_FILE_ASSETS" = "true" ]; then
            # Copy signatures (extract and copy only files, not directories)
            if [ -f artifacts/signatures/signatures.tar.gz ]; then
              mkdir -p /tmp/sig-extract
              tar -xzf artifacts/signatures/signatures.tar.gz -C /tmp/sig-extract/
              copy_release_assets "signature bundles" "/tmp/sig-extract" 1 -name "*.bundle"
              rm -rf /tmp/sig-extract
            else
              echo "::error::Missing signature archive: artifacts/signatures/signatures.tar.gz was not downloaded"
              exit 1
            fi
          else
            echo "No file assets selected; skipping signature bundle staging"
          fi

          echo "📦 Release assets prepared:"
          ls -la final-assets/ || echo "No assets found"

      - name: Validate release asset manifest
        env:
          DEPLOY_SNAP: ${{ needs.calculate-version.outputs.deploy-snap }}
          DEPLOY_MICROSOFT: ${{ needs.calculate-version.outputs.deploy-microsoft }}
          DEPLOY_APPLE: ${{ needs.calculate-version.outputs.deploy-apple }}
          DEPLOY_LINUX_TERMINAL: ${{ needs.calculate-version.outputs.deploy-linux-terminal }}
          DEPLOY_CLI: ${{ needs.calculate-version.outputs.deploy-cli }}
          DEPLOY_NPM: ${{ needs.calculate-version.outputs.deploy-npm }}
          HAS_FILE_ASSETS: ${{ needs.calculate-version.outputs.has-file-assets }}
        run: |
          set -euo pipefail

          missing=false

          require_count() {
            local description="$1"
            local min_count="$2"
            shift 2
            local count

            count=$(find final-assets "$@" -type f | wc -l | tr -d ' ')
            if [ "$count" -lt "$min_count" ]; then
              echo "::error::Missing ${description}: expected at least ${min_count}, found ${count}"
              missing=true
            else
              echo "✅ ${description}: found ${count}"
            fi
          }

          if [ "$DEPLOY_SNAP" = "true" ]; then
            require_count "Snap packages" 2 -name "*.snap"
          fi

          if [ "$DEPLOY_MICROSOFT" = "true" ]; then
            require_count "Windows executable" 1 -name "*.exe"
            require_count "Windows MSIX bundle" 1 -name "*.msixbundle"
          fi

          if [ "$DEPLOY_APPLE" = "true" ]; then
            require_count "macOS DMG" 1 -name "*.dmg"
          fi

          if [ "$DEPLOY_LINUX_TERMINAL" = "true" ]; then
            require_count "Linux server binaries" 1 -name "whodb-*-linux-*"
          fi

          if [ "$DEPLOY_CLI" = "true" ] || [ "$DEPLOY_NPM" = "true" ]; then
            require_count "CLI binaries" 1 -name "whodb-cli-*"
          fi

          if [ "$HAS_FILE_ASSETS" = "true" ]; then
            require_count "signature bundles" 1 -name "*.bundle"
          else
            echo "No file assets selected; skipping signature bundle validation"
          fi

          if [ "$missing" = "true" ]; then
            echo "::error::Release asset manifest validation failed"
            exit 1
          fi

      - name: Prepare release body
        id: release_body
        env:
          VERSION: ${{ needs.calculate-version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📝 Preparing release body from template..."

          # Read the template
          TEMPLATE=$(cat .github/templates/RELEASE_TEMPLATE.md)

          # Get PR description if this was triggered by a push (merged PR)
          PR_DESCRIPTION=""
          if [ "${{ github.event_name }}" = "push" ]; then
            # Find the most recently merged PR to release branch
            PR_NUMBER=$(gh pr list --state merged --base release --limit 1 --json number --jq '.[0].number // empty')
            if [ -n "$PR_NUMBER" ]; then
              PR_DESCRIPTION=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
              echo "Using PR #$PR_NUMBER description"
            else
              echo "No merged PR found"
            fi
          else
            echo "Not triggered by push - no PR description"
          fi

          # Replace PR description or remove the placeholder
          if [ -n "$PR_DESCRIPTION" ]; then
            # Save PR description to temp file to preserve newlines
            echo "$PR_DESCRIPTION" > /tmp/pr_description.txt

            # Replace version in template
            TEMPLATE="${TEMPLATE//\{\{VERSION\}\}/$VERSION}"

            # Replace PR_DESCRIPTION with actual file content using awk
            awk '
              /{{PR_DESCRIPTION}}/ {
                while ((getline line < "/tmp/pr_description.txt") > 0) {
                  print line
                }
                close("/tmp/pr_description.txt")
                next
              }
              { print }
            ' <<< "$TEMPLATE" > /tmp/release-body.md
          else
            # Replace version and remove PR_DESCRIPTION placeholder
            TEMPLATE="${TEMPLATE//\{\{VERSION\}\}/$VERSION}"
            echo "$TEMPLATE" | sed '/{{PR_DESCRIPTION}}/d' > /tmp/release-body.md
          fi

          echo "✅ Release body prepared"
          echo "Preview:"
          cat /tmp/release-body.md

      - name: Create GitHub release with assets (as draft)
        if: needs.calculate-version.outputs.has-file-assets == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ needs.calculate-version.outputs.version }}
          name: Release ${{ needs.calculate-version.outputs.version }}
          # IMPORTANT: Always create as draft first to support immutable releases
          # Assets must be attached BEFORE publishing, as immutable releases
          # cannot have assets added after publication
          draft: true
          prerelease: false
          generateReleaseNotes: true
          artifacts: final-assets/*
          bodyFile: /tmp/release-body.md

      - name: Create GitHub release without assets (as draft)
        if: needs.calculate-version.outputs.has-file-assets != 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ needs.calculate-version.outputs.version }}
          name: Release ${{ needs.calculate-version.outputs.version }}
          draft: true
          prerelease: false
          generateReleaseNotes: true
          bodyFile: /tmp/release-body.md

      # Verify and publish the draft release (production runs only)
      # This step runs AFTER assets are uploaded by the release-action above
      - name: Verify and publish release (if not stage-only)
        if: needs.calculate-version.outputs.stage-only != 'true' && needs.calculate-version.outputs.publish-github-release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.calculate-version.outputs.version }}
          DEPLOY_SNAP: ${{ needs.calculate-version.outputs.deploy-snap }}
          DEPLOY_MICROSOFT: ${{ needs.calculate-version.outputs.deploy-microsoft }}
          DEPLOY_APPLE: ${{ needs.calculate-version.outputs.deploy-apple }}
          DEPLOY_LINUX_TERMINAL: ${{ needs.calculate-version.outputs.deploy-linux-terminal }}
          DEPLOY_CLI: ${{ needs.calculate-version.outputs.deploy-cli }}
          DEPLOY_NPM: ${{ needs.calculate-version.outputs.deploy-npm }}
          HAS_FILE_ASSETS: ${{ needs.calculate-version.outputs.has-file-assets }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying draft release ${VERSION} before publishing..."

          require_uploaded_count() {
            local description="$1"
            local min_count="$2"
            local jq_filter="$3"
            local count

            count=$(jq "[.assets[].name | select(${jq_filter})] | length" <<< "$RELEASE_INFO")
            if [ "$count" -lt "$min_count" ]; then
              echo "❌ ERROR: Missing uploaded ${description}: expected at least ${min_count}, found ${count}"
              return 1
            fi

            echo "✅ Uploaded ${description}: found ${count}"
          }

          # Verify release exists and is a draft
          RELEASE_INFO=$(gh release view "${VERSION}" --json isDraft,assets,body)
          IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')

          if [ "$IS_DRAFT" != "true" ]; then
            echo "⚠️ Release is not a draft (isDraft=${IS_DRAFT}). It may have been published already."
            echo "Skipping publish step."
            exit 0
          fi
          echo "✅ Release is in draft state"

          # Verify assets were uploaded
          ASSET_COUNT=$(echo "$RELEASE_INFO" | jq '.assets | length')
          echo "📦 Found ${ASSET_COUNT} assets attached to release"

          if [ "$HAS_FILE_ASSETS" = "true" ] && [ "$ASSET_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No assets found on draft release!"
            echo "This may indicate an upload failure. Check previous steps."
            exit 1
          elif [ "$HAS_FILE_ASSETS" != "true" ]; then
            echo "No file assets selected; skipping release asset count requirement"
          fi

          if [ "$DEPLOY_SNAP" = "true" ]; then
            require_uploaded_count "Snap packages" 2 'endswith(".snap")'
          fi

          if [ "$DEPLOY_MICROSOFT" = "true" ]; then
            require_uploaded_count "Windows executable" 1 'endswith(".exe")'
            require_uploaded_count "Windows MSIX bundle" 1 'endswith(".msixbundle")'
          fi

          if [ "$DEPLOY_APPLE" = "true" ]; then
            require_uploaded_count "macOS DMG" 1 'endswith(".dmg")'
          fi

          if [ "$DEPLOY_LINUX_TERMINAL" = "true" ]; then
            require_uploaded_count "Linux server binaries" 1 'test("^whodb-.*-linux-.*$")'
          fi

          if [ "$DEPLOY_CLI" = "true" ] || [ "$DEPLOY_NPM" = "true" ]; then
            require_uploaded_count "CLI binaries" 1 'startswith("whodb-cli-")'
          fi

          if [ "$HAS_FILE_ASSETS" = "true" ]; then
            require_uploaded_count "signature bundles" 1 'endswith(".bundle")'
            echo "✅ Assets verified (${ASSET_COUNT} files)"
          else
            echo "✅ Docker-only release verified without file assets"
          fi

          # Verify release body is present
          BODY_LENGTH=$(echo "$RELEASE_INFO" | jq '.body | length')
          if [ "$BODY_LENGTH" -lt 50 ]; then
            echo "⚠️ Warning: Release body seems short (${BODY_LENGTH} chars)"
          else
            echo "✅ Release body present (${BODY_LENGTH} chars)"
          fi

          # Publish the release
          echo ""
          echo "🚀 Publishing release ${VERSION}..."
          gh release edit "${VERSION}" --draft=false
          echo "✅ Release ${VERSION} published successfully!"

          # Final verification
          FINAL_STATE=$(gh release view "${VERSION}" --json isDraft --jq '.isDraft')
          if [ "$FINAL_STATE" = "false" ]; then
            echo "✅ Verified: Release is now public and immutable"
          else
            echo "❌ ERROR: Release still in draft state after publish attempt"
            exit 1
          fi

  # Deploy selected stores after their builds and signing validation
  deploy-snap:
    name: Deploy Snap
    needs: [ calculate-version, build-snap, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-snap == 'true' &&
      needs.build-snap.result == 'success' &&
      needs.sign-and-validate.result == 'success'
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/_deploy-snap.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      channel: ${{ needs.calculate-version.outputs.stage-only == 'true' && 'edge' || 'stable' }}
    secrets: inherit

  deploy-microsoft:
    name: Deploy Microsoft
    needs: [ calculate-version, build-windows, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-microsoft == 'true' &&
      needs.build-windows.result == 'success' &&
      needs.sign-and-validate.result == 'success'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_deploy-microsoft.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      stage-only: ${{ needs.calculate-version.outputs.stage-only == 'true' }}
    secrets: inherit

  deploy-apple:
    name: Deploy Apple
    needs: [ calculate-version, build-apple, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-apple == 'true' &&
      needs.build-apple.result == 'success' &&
      needs.sign-and-validate.result == 'success'
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/_deploy-apple.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      stage-only: ${{ needs.calculate-version.outputs.stage-only == 'true' }}
      release-notes: ${{ needs.calculate-version.outputs.release-notes }}
    secrets: inherit

  # Deploy to Docker Hub
  # Rebuilds from GHA buildx cache populated by build-docker and pushes with attestations.
  deploy-docker:
    name: Deploy Docker
    needs: [ calculate-version, build-docker, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-docker == 'true' &&
      needs.build-docker.result == 'success' &&
      (
        (needs.calculate-version.outputs.has-file-assets == 'true' && needs.sign-and-validate.result == 'success') ||
        (needs.calculate-version.outputs.has-file-assets != 'true' && needs.sign-and-validate.result == 'skipped')
      )
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/_deploy-docker.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      stage-only: ${{ needs.calculate-version.outputs.stage-only == 'true' }}
    secrets: inherit

  # Deploy CLI image to Docker Hub
  deploy-docker-cli:
    name: Deploy CLI Docker
    needs: [ calculate-version, build-docker-cli, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-docker == 'true' &&
      needs.build-docker-cli.result == 'success' &&
      (
        (needs.calculate-version.outputs.has-file-assets == 'true' && needs.sign-and-validate.result == 'success') ||
        (needs.calculate-version.outputs.has-file-assets != 'true' && needs.sign-and-validate.result == 'skipped')
      )
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/_deploy-docker-cli.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}
      stage-only: ${{ needs.calculate-version.outputs.stage-only == 'true' }}
    secrets: inherit

  # Deploy CLI packages to npm
  deploy-npm:
    name: Deploy npm
    needs: [ calculate-version, build-cli, sign-and-validate ]
    if: |
      always() &&
      needs.calculate-version.outputs.deploy-npm == 'true' &&
      needs.build-cli.result == 'success' &&
      needs.sign-and-validate.result == 'success'
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/_deploy-npm.yml
    with:
      version: ${{ needs.calculate-version.outputs.version }}

  # Post-release housekeeping
  stamp-plugin-version:
    name: Stamp Plugin Version on Main
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [calculate-version, create-github-release]
    if: |
      needs.create-github-release.result == 'success' &&
      needs.calculate-version.outputs.stage-only != 'true'
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          submodules: false

      - name: Stamp and push plugin.json
        env:
          VERSION: ${{ needs.calculate-version.outputs.version }}
        run: |
          PLUGIN_JSON="cli/external-plugin/whodb/.claude-plugin/plugin.json"
          jq --arg v "$VERSION" '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"
          if git diff --quiet "$PLUGIN_JSON"; then
            echo "plugin.json already at version $VERSION"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$PLUGIN_JSON"
            git commit -m "chore: stamp plugin.json version to $VERSION"
            git push origin main
            echo "Stamped plugin.json to $VERSION on main"
          fi

  # Release summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [
      calculate-version,
      build-docker,
      build-docker-cli,
      build-windows,
      build-apple,
      build-snap,
      build-linux-terminal,
      build-cli,
      sign-and-validate,
      deploy-docker,
      deploy-docker-cli,
      deploy-snap,
      deploy-microsoft,
      deploy-apple,
      deploy-npm,
      create-github-release,
      stamp-plugin-version
    ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            deb.debian.org:443
            deb.debian.org:80

      - name: Generate comprehensive summary
        run: |
          {
          status_label() {
            case "$1" in
              success) echo "✅ Success" ;;
              skipped) echo "⏭️ Skipped" ;;
              failure|cancelled) echo "❌ Failed" ;;
              *) echo "❓ Unknown" ;;
            esac
          }

          build_row() {
            local name="$1"
            local result="$2"
            echo "| ${name} | $(status_label "$result") |"
          }

          deploy_row() {
            local name="$1"
            local result="$2"
            local selected="$3"
            local success_note="$4"

            case "$result" in
              success)
                echo "| ${name} | ✅ Deployed | ${success_note} |"
                ;;
              skipped)
                if [ "$selected" = "true" ]; then
                  echo "| ${name} | ⏭️ Skipped | Blocked before deploy |"
                else
                  echo "| ${name} | ⏭️ Skipped | Not selected |"
                fi
                ;;
              failure|cancelled)
                echo "| ${name} | ❌ Failed | GitHub release blocked |"
                ;;
              *)
                echo "| ${name} | ❓ Unknown | Check logs |"
                ;;
            esac
          }

          release_result="${{ needs.create-github-release.result }}"
          stage_only="${{ needs.calculate-version.outputs.stage-only }}"
          publish_release="${{ needs.calculate-version.outputs.publish-github-release }}"
          release_succeeded="false"

          echo "# 📊 Release Summary for ${{ needs.calculate-version.outputs.version }}"
          echo ""
          echo "**Deployment Mode:** ${{ needs.calculate-version.outputs.deployment-mode }}"
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""

          # Build Status
          echo "## 🔨 Build Status"
          echo "| Component | Status |"
          echo "|-----------|--------|"

          build_row "Docker" "${{ needs.build-docker.result }}"
          build_row "CLI Docker" "${{ needs.build-docker-cli.result }}"
          build_row "Windows" "${{ needs.build-windows.result }}"
          build_row "Apple" "${{ needs.build-apple.result }}"
          build_row "Snap" "${{ needs.build-snap.result }}"
          build_row "Linux Terminal" "${{ needs.build-linux-terminal.result }}"
          build_row "CLI (MCP Server)" "${{ needs.build-cli.result }}"
          build_row "Sign and Validate" "${{ needs.sign-and-validate.result }}"

          echo ""

          # Deployment Status
          echo "## 🚀 Deployment Status"
          echo "| Platform | Status | Notes |"
          echo "|----------|--------|-------|"

          deploy_row "Docker Hub" "${{ needs.deploy-docker.result }}" "${{ needs.calculate-version.outputs.deploy-docker }}" "Version tag updated"
          deploy_row "Docker Hub (CLI)" "${{ needs.deploy-docker-cli.result }}" "${{ needs.calculate-version.outputs.deploy-docker }}" "Version tag updated"
          deploy_row "Snap Store" "${{ needs.deploy-snap.result }}" "${{ needs.calculate-version.outputs.deploy-snap }}" "${{ needs.calculate-version.outputs.stage-only == 'true' && 'edge channel' || 'stable channel' }}"
          deploy_row "Microsoft Store" "${{ needs.deploy-microsoft.result }}" "${{ needs.calculate-version.outputs.deploy-microsoft }}" "${{ needs.calculate-version.outputs.stage-only == 'true' && 'Draft submission' || 'Submitted for certification' }}"
          deploy_row "Apple App Store" "${{ needs.deploy-apple.result }}" "${{ needs.calculate-version.outputs.deploy-apple }}" "${{ needs.calculate-version.outputs.stage-only == 'true' && 'TestFlight only' || 'Submitted for review' }}"
          deploy_row "npm (@clidey/whodb-cli)" "${{ needs.deploy-npm.result }}" "${{ needs.calculate-version.outputs.deploy-npm }}" "All platform packages"

          echo ""

          echo "## 🧾 Final Release Gate"
          echo "| Gate | Status | Notes |"
          echo "|------|--------|-------|"

          if [ "$release_result" = "success" ]; then
            release_succeeded="true"
            if [ "$stage_only" = "true" ] || [ "$publish_release" != "true" ]; then
              release_note="Draft release"
            else
              release_note="Published"
            fi
            if [ "${{ needs.calculate-version.outputs.deploy-linux-terminal }}" = "true" ]; then
              release_note="${release_note} (includes Linux Terminal)"
            fi
            echo "| GitHub Release | ✅ Created | ${release_note} |"
          elif [ "$release_result" = "skipped" ]; then
            echo "| GitHub Release | ⏭️ Blocked | A selected build, deploy, or validation job did not succeed |"
          else
            echo "| GitHub Release | ❌ Failed | Check release job logs |"
          fi

          echo ""

          echo "## 🧹 Post-release Housekeeping"
          echo "| Task | Status | Notes |"
          echo "|------|--------|-------|"
          case "${{ needs.stamp-plugin-version.result }}" in
            success)
              echo "| Plugin version stamp | ✅ Complete | plugin.json updated or already current |"
              ;;
            skipped)
              echo "| Plugin version stamp | ⏭️ Skipped | Stage-only run or GitHub release did not complete |"
              ;;
            failure|cancelled)
              echo "| Plugin version stamp | ⚠️ Needs follow-up | Release completed; plugin.json stamp failed separately |"
              ;;
            *)
              echo "| Plugin version stamp | ❓ Unknown | Check stamp-plugin-version logs |"
              ;;
          esac

          echo ""

          # Next Steps
          echo "## 📝 Next Steps"

          if [ "$release_succeeded" != "true" ]; then
            echo "GitHub release was blocked. Resolve the failed selected build, deploy, or validation job, then rerun the release."
          elif [ "$stage_only" = "true" ]; then
            echo "Stage deployments completed and a draft GitHub release was created. To promote to production:"
            echo "1. Test the edge/draft releases"
            echo "2. Promote Snap from edge to stable channel"
            echo "3. Submit Microsoft Store draft for certification"
            echo "4. Submit Apple TestFlight build for App Store review"
            echo "5. Publish the GitHub draft release after all channels are ready"
          else
            echo "Production deployment completed!"
            echo ""
            echo "**Monitor the following:**"
            echo "- Microsoft Store certification status"
            echo "- Apple App Store review status"
            echo "- User feedback on new release"
            echo ""
            echo "**If any platform failed:**"
            echo "1. Check the logs for the failed job"
            echo "2. Fix the issue"
            echo "3. Re-run the failed job from Actions → Re-run jobs → Re-run failed jobs"
          fi
          } >> "$GITHUB_STEP_SUMMARY"
