name: Deploy CLI to Docker Hub

on:
  workflow_call:
    inputs:
      version:
        description: 'Version being deployed'
        required: true
        type: string
      stage-only:
        description: 'Stage only deployment'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  push-docker-cli:
    name: Push CLI Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: deploy-docker
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            dl-cdn.alpinelinux.org:443
            fulcio.sigstore.dev:443
            github.com:443
            index.docker.io:443
            objects.githubusercontent.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stamp plugin.json version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PLUGIN_JSON="cli/external-plugin/whodb/.claude-plugin/plugin.json"
          jq --arg v "$VERSION" '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"

      - name: Build from cache and push with attestations
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./cli/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          provenance: mode=max
          tags: clidey/whodb-cli:${{ inputs.version }}-${{ matrix.arch }}
          cache-from: type=gha
          build-args: |
            VERSION=${{ inputs.version }}

  create-manifest-cli:
    name: Create CLI manifest and sign
    needs: push-docker-cli
    runs-on: ubuntu-latest
    environment: deploy-docker
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            fulcio.sigstore.dev:443
            github.com:443
            index.docker.io:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            registry-1.docker.io:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ inputs.version }}
          STAGE_ONLY: ${{ inputs.stage-only }}
        run: |
          echo "Creating multi-arch manifest for CLI ${VERSION}..."
          docker buildx imagetools create \
            -t "clidey/whodb-cli:${VERSION}" \
            "clidey/whodb-cli:${VERSION}-amd64" \
            "clidey/whodb-cli:${VERSION}-arm64"

          if [ "${STAGE_ONLY}" != "true" ]; then
            echo "Updating latest tag..."
            docker buildx imagetools create \
              -t "clidey/whodb-cli:latest" \
              "clidey/whodb-cli:${VERSION}-amd64" \
              "clidey/whodb-cli:${VERSION}-arm64"
          fi

          echo "CLI Docker images deployed successfully"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign CLI Docker images with Cosign
        env:
          VERSION: ${{ inputs.version }}
          STAGE_ONLY: ${{ inputs.stage-only }}
        run: |
          echo "Signing CLI Docker images..."
          cosign sign --yes "clidey/whodb-cli:${VERSION}"

          if [ "${STAGE_ONLY}" != "true" ]; then
            cosign sign --yes "clidey/whodb-cli:latest"
          fi

          echo "CLI Docker images signed"
