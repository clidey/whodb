name: Build AppImage

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build-appimage:
    name: Build AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: permission-required
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'desktop-ce/go.mod'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            wget \
            fuse \
            file

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: frontend-build-ce
          path: frontend/build

      - name: Copy frontend to desktop directory
        run: |
          mkdir -p desktop-ce/frontend/dist
          cp -r frontend/build/* desktop-ce/frontend/dist/

      # - name: Cache Wails binary
      #   id: cache-wails
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/go/bin/wails
      #     key: ${{ runner.os }}-${{ runner.arch }}-wails-v2.10.2

      - name: Set up Wails
        run: |
          WAILS_VERSION=$(grep 'github.com/wailsapp/wails/v2' desktop-common/go.mod | awk '{print $2}')
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Determine Go workspace
        id: gowork
        run: |

      - name: Build Wails app for ${{ matrix.arch }}
        run: |
          cd ${{ steps.gowork.outputs.source_dir }}

          # Use make ci-build-prod-linux which handles webkit2_41 tags
          # Frontend is already built and copied to frontend/dist
          TARGET_ARCH=${{ matrix.arch }} make ci-build-prod-linux VERSION=${{ inputs.version }}

      - name: Build AppImage
        run: |
          chmod +x .github/scripts/build-appimage.sh
          ./.github/scripts/build-appimage.sh ${{ matrix.arch }} ${{ inputs.version }}

      - name: Verify AppImage
        run: |
          APPIMAGE="WhoDB-${{ inputs.version }}-${{ matrix.arch }}.AppImage"

          if [ ! -f "$APPIMAGE" ]; then
            echo "❌ AppImage not found: $APPIMAGE"
            exit 1
          fi

          chmod +x "$APPIMAGE"
          echo "✅ AppImage created: $APPIMAGE"
          ls -lh "$APPIMAGE"
          file "$APPIMAGE"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appimage-${{ matrix.arch }}
          path: WhoDB-${{ inputs.version }}-${{ matrix.arch }}.AppImage
          retention-days: 1
