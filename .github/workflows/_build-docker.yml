name: Build Docker Images

# Builds Docker images and populates the GHA buildx cache.
# Images are NOT pushed here — the deploy workflow rebuilds from cache
# and pushes with SBOM/provenance attestations.
#
# Produces:
# - GHA buildx cache entries consumed by _deploy-docker.yml.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

permissions:
  contents: read
  actions: write
  security-events: write

jobs:
  build-docker:
    name: Build Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: permission-required
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            app.posthog.com:443
            auth.docker.io:443
            deb.debian.org:443
            deb.debian.org:80
            dl-cdn.alpinelinux.org:443
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            s3.us-east-1.amazonaws.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            us.i.posthog.com:443
            us.posthog.com:443
            mirror.gcr.io:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: frontend-build-ce
          path: frontend/build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (cache + local scan image)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./core/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: whodb-scan:${{ inputs.version }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ inputs.version }}
            PLATFORM=docker
            USE_PREBUILT_FRONTEND=true

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: whodb-scan:${{ inputs.version }}-${{ matrix.arch }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF report
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: trivy-results.sarif
          category: whodb-docker-${{ matrix.arch }}

      - name: Upload Trivy SARIF artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif-whodb-docker-${{ matrix.arch }}
          path: trivy-results.sarif
          retention-days: 7

      - name: Remove local scan image
        if: always()
        run: docker rmi whodb-scan:${{ inputs.version }}-${{ matrix.arch }} 2>/dev/null || true
