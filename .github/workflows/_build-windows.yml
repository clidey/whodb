name: Build Windows Applications

# Produces:
# - desktop-windows-amd64: Windows executable consumed by Microsoft packaging and GitHub release.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      platforms:
        description: 'Platforms to build (comma-separated: windows-amd64,windows-arm64)'
        required: false
        type: string
        default: 'windows-amd64'

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    environment: permission-required
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            make-target: ci-build-prod-windows-amd64
            enabled: ${{ contains(inputs.platforms, 'windows-amd64') }}
          - os: windows-11-arm
            arch: arm64
            make-target: ci-build-prod-windows-arm64
            enabled: ${{ contains(inputs.platforms, 'windows-arm64') }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            adl.windows.com:80
            api.github.com:443
            app.posthog.com:443
            au.download.windowsupdate.com:80
            cp601.prod.do.dsp.mp.microsoft.com:443
            cp801.prod.do.dsp.mp.microsoft.com:443
            dc.services.visualstudio.com:443
            deb.debian.org:443
            deb.debian.org:80
            download.windowsupdate.com:80
            fe2cr.update.microsoft.com:443
            fs.microsoft.com:443
            geo.prod.do.dsp.mp.microsoft.com:443
            github.com:443
            incoming.telemetry.mozilla.org:443
            kv601.prod.do.dsp.mp.microsoft.com:443
            kv801.prod.do.dsp.mp.microsoft.com:443
            login.live.com:443
            mobile.events.data.microsoft.com:443
            objects.githubusercontent.com:443
            ocsp.digicert.com:80
            ocsp.sectigo.com:80
            proxy.golang.org:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            settings-win.data.microsoft.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            tas02.sls.update.microsoft.com:443
            telemetry-incoming.r53-2.services.mozilla.com:443
            us.i.posthog.com:443
            us.posthog.com:443
            v1.ta2.fe2cr.update.microsoft.com:443
            www.microsoft.com:80

      - name: Skip if not enabled
        if: matrix.enabled == false
        run: echo "Skipping windows-${{ matrix.arch }}"

      - name: Checkout
        if: matrix.enabled != false
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Setup Go
        if: matrix.enabled != false
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'desktop-ce/go.mod'
          cache: true
          cache-dependency-path: |
            desktop-ce/go.sum
            desktop-ce/go.mod
            core/go.sum
            core/go.mod

      - name: Download frontend build artifact
        if: matrix.enabled != false
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: frontend-build-ce
          path: frontend/build

      - name: Cache Wails binary
        if: matrix.enabled != false
        id: cache-wails
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/bin/wails
            ~/go/bin/wails.exe
          key: ${{ runner.os }}-${{ runner.arch }}-wails-${{ hashFiles('desktop-common/go.mod') }}

      - name: Install Wails CLI
        if: matrix.enabled != false && steps.cache-wails.outputs.cache-hit != 'true'
        shell: bash
        run: |
          WAILS_VERSION=$(grep 'github.com/wailsapp/wails/v2' desktop-common/go.mod | awk '{print $2}')
          go install "github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}"

      # Windows AMD64 Build
      - name: Build Windows AMD64
        if: matrix.arch == 'amd64' && matrix.enabled != false
        working-directory: ./desktop-ce
        shell: pwsh
        env:
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ inputs.version }}
        run: |
          Write-Host "Building Windows executable for MSIX packaging..."
          Write-Host "Building with VERSION=$env:VERSION"

          make ${{ matrix.make-target }} VERSION="$env:VERSION"

          if ($LASTEXITCODE -ne 0) {
              Write-Error "Make build failed with exit code: $LASTEXITCODE"
              exit 1
          }

          # Verify the executable is in the expected location
          if (Test-Path "build/windows/amd64/whodb.exe") {
              Write-Host "Executable ready: build/windows/amd64/whodb.exe"
          } else {
              Write-Error "Could not find whodb.exe at expected location"
              exit 1
          }

      # Windows ARM64 Build (temporarily disabled)
      - name: Skip Windows ARM64 Build
        if: matrix.arch == 'arm64' && matrix.enabled != false
        shell: pwsh
        run: |
          Write-Host "Windows ARM64 build is temporarily disabled due to toolchain issues"
          New-Item -ItemType Directory -Force -Path "./desktop-ce/build/windows/arm64"

      - name: Upload Windows artifacts
        if: matrix.enabled != false && (matrix.arch != 'arm64')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-windows-${{ matrix.arch }}
          path: |
            desktop-ce/build/
          retention-days: 7
