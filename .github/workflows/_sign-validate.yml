name: Sign and Validate Builds

# Consumes selected build artifacts:
# - snap-package-amd64
# - snap-package-arm64
# - desktop-windows-amd64
# - desktop-darwin-dmg
# - desktop-darwin-mas-app
# - server-binaries-ce
# Produces:
# - signatures: Sigstore bundles consumed by GitHub release.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version being signed'
        required: true
        type: string
      validate-snap:
        description: 'Whether to validate Snap builds'
        required: false
        type: boolean
        default: true
      validate-desktop:
        description: 'Whether to validate Desktop builds'
        required: false
        type: boolean
        default: true
      validate-windows:
        description: 'Whether to validate Windows desktop builds'
        required: false
        type: boolean
        default: false
      validate-apple:
        description: 'Whether to validate Apple desktop builds'
        required: false
        type: boolean
        default: false
      validate-linux-terminal:
        description: 'Whether to validate Linux server binaries'
        required: false
        type: boolean
        default: false

jobs:
  sign-with-sigstore:
    name: Sign with Sigstore
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            deb.debian.org:443
            deb.debian.org:80
            fulcio.sigstore.dev:443
            github.com:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Download Snap amd64 package
        if: inputs.validate-snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-amd64
          path: artifacts/snap-package-amd64/

      - name: Download Snap arm64 package
        if: inputs.validate-snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-arm64
          path: artifacts/snap-package-arm64/

      - name: Download Windows desktop build
        if: inputs.validate-windows
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-windows-amd64
          path: artifacts/desktop-windows-amd64/

      - name: Download macOS DMG
        if: inputs.validate-apple
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-darwin-dmg
          path: artifacts/desktop-darwin-dmg/

      - name: Download macOS App Store bundle
        if: inputs.validate-apple
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-darwin-mas-app
          path: artifacts/desktop-darwin-mas-app/

      - name: Download Linux server binaries
        if: inputs.validate-linux-terminal
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: server-binaries-ce
          path: artifacts/server-binaries-ce/

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts
        run: |
          echo "🔏 Signing artifacts with Sigstore..."

          # Find all artifacts to sign (excluding Docker .tar files)
          find artifacts -type f \( -name "*.snap" -o -name "*.exe" -o -name "*.dmg" -o -name "*.pkg" -o -name "*.msix" -o -name "*.msixbundle" -o -name "whodb-*-linux-*" \) | while read -r file; do
            echo "Signing: $file"

            # Sign the artifact using bundle format (modern cosign approach)
            cosign sign-blob --yes \
              --bundle "${file}.bundle" \
              "$file"

            echo "✅ Signed: $(basename "$file")"
          done

      - name: Create signatures archive
        run: |
          mkdir -p signatures
          find artifacts -name "*.bundle" | while read -r file; do
            cp "$file" signatures/
          done
          tar czf signatures.tar.gz signatures/

      - name: Upload signatures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: signatures.tar.gz
          retention-days: 7

  validate-builds:
    name: Validate All Builds
    runs-on: ubuntu-latest
    needs: [ sign-with-sigstore ]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            deb.debian.org:443
            deb.debian.org:80
            github.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout for scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Download Snap amd64 package
        if: inputs.validate-snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-amd64
          path: artifacts/snap-package-amd64/

      - name: Download Snap arm64 package
        if: inputs.validate-snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-arm64
          path: artifacts/snap-package-arm64/

      - name: Download Windows desktop build
        if: inputs.validate-windows
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-windows-amd64
          path: artifacts/desktop-windows-amd64/

      - name: Download macOS DMG
        if: inputs.validate-apple
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-darwin-dmg
          path: artifacts/desktop-darwin-dmg/

      - name: Download macOS App Store bundle
        if: inputs.validate-apple
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: desktop-darwin-mas-app
          path: artifacts/desktop-darwin-mas-app/

      - name: Download signatures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: signatures
          path: .

      - name: Extract signatures
        run: tar xzf signatures.tar.gz

      - name: Install Cosign for verification
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Validate Snap artifacts
        if: inputs.validate-snap
        run: |
          echo "📦 Validating Snap artifacts..."
          FAILED=false

          for arch in amd64 arm64; do
            ARTIFACT_DIR="artifacts/snap-package-${arch}"
            if [ -d "$ARTIFACT_DIR" ]; then
              SNAP_FILE=$(find "$ARTIFACT_DIR" -name "*.snap" | head -1)
              if [ -n "$SNAP_FILE" ]; then
                echo "✅ Found Snap ${arch} package: $(basename "$SNAP_FILE")"

                # Verify filename contains correct version
                SNAP_NAME=$(basename "$SNAP_FILE")
                VERSION="${{ inputs.version }}"
                VERSION_NO_V="${VERSION#v}"  # Remove leading 'v' if present

                if [[ "$SNAP_NAME" == *"_${VERSION}_"* ]] || [[ "$SNAP_NAME" == *"_${VERSION_NO_V}_"* ]]; then
                  echo "✅ Snap filename contains correct version: $VERSION"
                else
                  echo "::error::Snap filename doesn't contain expected version $VERSION"
                  echo "::error::Found: $SNAP_NAME"
                  FAILED=true
                fi
              else
                echo "❌ Snap ${arch} package missing"
                FAILED=true
              fi
            else
              echo "❌ Snap ${arch} artifact directory missing"
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::Snap validation failed"
            exit 1
          fi

      - name: Validate Desktop artifacts
        if: inputs.validate-desktop
        run: |
          echo "🖥️ Validating Desktop artifacts..."
          FAILED=false

          # Check Windows builds
          if [ "${{ inputs.validate-windows }}" = "true" ]; then
            if find artifacts/desktop-windows-amd64 -name "whodb.exe" -type f | grep -q .; then
              echo "✅ Windows AMD64 desktop executable found"
            else
              echo "❌ Windows AMD64 desktop executable missing"
              FAILED=true
            fi
          fi

          # Check macOS builds
          if [ "${{ inputs.validate-apple }}" = "true" ]; then
            if find artifacts/desktop-darwin-dmg -name "*.dmg" -type f | grep -q .; then
              echo "✅ macOS DMG found"
            else
              echo "❌ macOS DMG missing"
              FAILED=true
            fi

            if find artifacts/desktop-darwin-mas-app -name "*.app" -type d | grep -q .; then
              echo "✅ macOS App Store bundle found"
            else
              echo "❌ macOS App Store bundle missing"
              FAILED=true
            fi
          fi

          if [ "$FAILED" = "true" ]; then
            echo "::error::Desktop validation failed"
            exit 1
          fi

      - name: Validate Linux server binaries
        if: inputs.validate-linux-terminal
        run: |
          echo "🐧 Validating Linux server binaries..."
          FAILED=false

          for arch in amd64 arm64 armv7 riscv64; do
            if find artifacts/server-binaries-ce -name "whodb-*-linux-${arch}" -type f | grep -q .; then
              echo "✅ Linux ${arch} server binary found"
            else
              echo "❌ Linux ${arch} server binary missing"
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::Linux server binary validation failed"
            exit 1
          fi

      - name: Create validation manifest
        run: |
          cat > validation_manifest.json <<EOF
          {
            "version": "${{ inputs.version }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "validation": {
              "snap": ${{ inputs.validate-snap }},
              "desktop": ${{ inputs.validate-desktop }},
              "windows": ${{ inputs.validate-windows }},
              "apple": ${{ inputs.validate-apple }},
              "linux_terminal": ${{ inputs.validate-linux-terminal }}
            },
            "artifacts": $(find artifacts -type f -name "*.snap" -o -name "*.exe" -o -name "*.dmg" | wc -l)
          }
          EOF

      - name: Upload validation manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployment-manifest-validated
          path: validation_manifest.json
          retention-days: 7
