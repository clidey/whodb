name: Build Linux Server Binaries

# Produces:
# - server-binaries-ce: Linux server binaries consumed by signing, validation, and GitHub release.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build-server:
    name: Build Linux Server Binaries (CE)
    runs-on: ubuntu-latest
    environment: permission-required
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            _http._tcp.azure.archive.ubuntu.com:443
            _https._tcp.esm.ubuntu.com:443
            _https._tcp.motd.ubuntu.com:443
            _https._tcp.packages.microsoft.com:443
            api.github.com:443
            app.posthog.com:443
            azure.archive.ubuntu.com:80
            deb.debian.org:443
            deb.debian.org:80
            esm.ubuntu.com:443
            github.com:443
            packages.microsoft.com:443
            proxy.golang.org:443
            registry.npmjs.org:443
            storage.googleapis.com:443
            sum.golang.org:443
            us.i.posthog.com:443
            us.posthog.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'core/go.mod'
          cache: true
          cache-dependency-path: |
            core/go.sum
            core/go.mod
            desktop-ce/go.sum
            desktop-ce/go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libc6-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-riscv64-linux-gnu \
            gcc-arm-linux-gnueabihf

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: frontend-build-ce
          path: frontend/build

      - name: Copy frontend to core build directory
        run: |
          rm -rf core/cmd/whodb/build
          mkdir -p core/cmd/whodb/build
          cp -r frontend/build/* core/cmd/whodb/build/

      - name: Add arm/riscv64 build tags to BAML client
        run: |
          # BAML doesn't support arm (armv6/armv7) or riscv64, so we exclude baml_client from these builds
          # This allows the server to work for non-AI features on arm and riscv64
          for dir in core/baml_client core/baml_client/types core/baml_client/stream_types core/baml_client/type_builder; do
            for file in "$dir"/*.go; do
              if [ -f "$file" ] && ! head -1 "$file" | grep -q "^//go:build"; then
                { echo '//go:build !arm && !riscv64'; echo ''; cat "$file"; } > "$file.tmp" && mv "$file.tmp" "$file"
              fi
            done
          done

      - name: Build all server binaries
        working-directory: ./desktop-ce
        env:
          VERSION: ${{ inputs.version }}
        run: |
          make server-all VERSION="$VERSION"

      - name: Verify server binaries
        run: |
          echo "Verifying built server binaries..."
          ls -lh desktop-common/build-server/

          for binary in desktop-common/build-server/whodb-*-linux-*; do
            if [ -f "$binary" ]; then
              echo "✅ Binary: $(basename "$binary")"
              file "$binary"
            else
              echo "❌ Missing binary: $binary"
              exit 1
            fi
          done

      - name: Upload server binaries artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-binaries-ce
          path: desktop-common/build-server/whodb-*-linux-*
          retention-days: 7
