name: Deploy to Snap Store

on:
  workflow_call:
    inputs:
      version:
        description: 'Version being deployed'
        required: true
        type: string
      channel:
        description: 'Snap channel (edge, beta, candidate, stable)'
        required: false
        type: string
        default: 'stable'

permissions:
  contents: read
  actions: read

jobs:
  deploy-snap:
    name: Deploy to Snap Store
    runs-on: ubuntu-latest
    environment: deploy-snap
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.snapcraft.io:443
            archive.ubuntu.com:80
            archive.ubuntu.com:443
            azure.archive.ubuntu.com:80
            azure.archive.ubuntu.com:443
            canonical-bos01.cdn.snapcraftcontent.com:443
            canonical-lgw01.cdn.snapcraftcontent.com:443
            dashboard.snapcraft.io:443
            deb.debian.org:443
            deb.debian.org:80
            github.com:443
            login.ubuntu.com:443
            security.ubuntu.com:80
            security.ubuntu.com:443
            storage.snapcraftcontent.com:443

      - name: Checkout for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Check deployment parameters
        run: |
          echo "📦 Snap Deployment Configuration:"
          echo "  Version: ${{ inputs.version }}"
          echo "  Channel: ${{ inputs.channel }}"

      - name: Download snap amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-amd64

      - name: Download snap arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: snap-package-arm64

      - name: Check Snapcraft credentials
        id: check_creds
        run: |
          if [ -n "${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
            echo "✅ Snapcraft credentials are configured"
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "⚠️ Snapcraft credentials not configured"

            if [ "${{ inputs.channel }}" = "stable" ]; then
              echo "::error::Production deployment requires SNAPCRAFT_STORE_CREDENTIALS"
              exit 1
            else
              echo "Continuing without credentials for ${{ inputs.channel }} channel"
            fi
          fi

      - name: Locate snap files
        id: locate_snaps
        run: |
          echo "Looking for snap files..."
          ls -la *.snap || echo "No snap files in current directory"

          AMD64_SNAP=$(ls *amd64*.snap 2>/dev/null | head -1 || echo "")
          ARM64_SNAP=$(ls *arm64*.snap 2>/dev/null | head -1 || echo "")

          if [ -z "$AMD64_SNAP" ] && [ -z "$ARM64_SNAP" ]; then
            echo "❌ No snap files found"
            if [ "${{ inputs.channel }}" != "stable" ]; then
              echo "Continuing in non-production mode..."
              echo "snap_found=false" >> $GITHUB_OUTPUT
              exit 0
            else
              exit 1
            fi
          fi

          [ -n "$AMD64_SNAP" ] && echo "✅ Found AMD64 snap: $AMD64_SNAP"
          [ -n "$ARM64_SNAP" ] && echo "✅ Found ARM64 snap: $ARM64_SNAP"

          echo "snap_found=true" >> $GITHUB_OUTPUT
          echo "amd64_snap=$AMD64_SNAP" >> $GITHUB_OUTPUT
          echo "arm64_snap=$ARM64_SNAP" >> $GITHUB_OUTPUT

      - name: Install Snapcraft
        if: steps.check_creds.outputs.has_creds == 'true' && steps.locate_snaps.outputs.snap_found == 'true'
        run: |
          if ! command -v snap >/dev/null 2>&1; then
            sudo apt-get update -q
            sudo apt-get install -qy snapd
          fi

          ROOT_OWNER=$(stat -c '%u:%g' /)
          if [ "$ROOT_OWNER" != "0:0" ]; then
            sudo chown root:root /
          fi

          if [ ! -x /snap/bin/snapcraft ]; then
            sudo snap install --classic snapcraft
          fi

      - name: Publish AMD64 snap
        if: steps.check_creds.outputs.has_creds == 'true' && steps.locate_snaps.outputs.amd64_snap != ''
        run: /snap/bin/snapcraft upload "${{ steps.locate_snaps.outputs.amd64_snap }}" --release "${{ inputs.channel }}"
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Publish ARM64 snap
        if: steps.check_creds.outputs.has_creds == 'true' && steps.locate_snaps.outputs.arm64_snap != ''
        run: /snap/bin/snapcraft upload "${{ steps.locate_snaps.outputs.arm64_snap }}" --release "${{ inputs.channel }}"
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ steps.check_creds.outputs.has_creds }}" = "true" ]; then
            echo "✅ Published snap packages to ${{ inputs.channel }} channel"
          else
            echo "⏭️ Skipped snap publication (no credentials)"
          fi
