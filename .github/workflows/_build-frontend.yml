# Shared frontend build workflow.
# Builds the frontend once and uploads it as an artifact for other jobs to download.

name: Build Frontend

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Build frontend
        working-directory: ./frontend
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          VITE_APP_VERSION: ${{ inputs.version }}
        run: |
          pnpm install
          pnpm run build:ce
          test -f build/.whodb-edition
          grep -qx 'ce' build/.whodb-edition

      # Upload source maps to PostHog for production error tracking
      - name: Upload source maps to PostHog
        uses: PostHog/upload-source-maps@991172e085213c222c61d2ba6a0b9e57c81e5066 # v2.0.0
        with:
          directory: frontend/build
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_API_KEY }}
          release-version: ${{ inputs.version }}
          delete-after-upload: true
        continue-on-error: true

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-build-ce
          path: frontend/build
          include-hidden-files: true
          retention-days: 1
