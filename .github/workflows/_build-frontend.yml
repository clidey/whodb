# Shared frontend build workflow.
# Builds the frontend once and uploads it as an artifact for other jobs to download.
#
# Produces:
# - frontend-build-ce: compiled CE frontend consumed by platform build/deploy jobs.

name: Build Frontend

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            app.posthog.com:443
            github.com:443
            nodejs.org:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            us.i.posthog.com:443
            us.posthog.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: ./frontend
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          VITE_APP_VERSION: ${{ inputs.version }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:ce
          test -f build/.whodb-edition
          grep -qx 'ce' build/.whodb-edition

      # Upload source maps to PostHog for production error tracking
      - name: Upload source maps to PostHog
        uses: PostHog/upload-source-maps@991172e085213c222c61d2ba6a0b9e57c81e5066 # v2.0.0
        with:
          directory: frontend/build
          project-id: ${{ secrets.POSTHOG_PROJECT_ID }}
          api-key: ${{ secrets.POSTHOG_API_KEY }}
          release-version: ${{ inputs.version }}
          delete-after-upload: true
        continue-on-error: true

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-build-ce
          path: frontend/build
          include-hidden-files: true
          retention-days: 7
