name: E2E Tests (CE)

# Runs Playwright E2E tests against all CE databases using a matrix strategy.
# A build job compiles the Go test binary once, then each database gets its own
# runner for resource isolation. A merge job combines all blob reports into a
# single HTML report.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Test Binary
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: core/go.mod

      - name: Create frontend build placeholder
        run: mkdir -p core/build && echo '<!doctype html>' > core/build/index.html

      - name: Build CE test binary
        working-directory: core
        run: go test -coverpkg=./... -c -o server.test ./cmd/whodb

      - name: Upload test binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-binary
          path: core/server.test
          retention-days: 1

  e2e:
    name: E2E - ${{ matrix.database }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        database:
          - postgres
          - mysql
          - mysql8
          - mariadb
          - tidb
          - sqlite
          - duckdb
          - mongodb
          - redis
          - elasticsearch
          - cockroachdb
          - clickhouse
          - memcached
          - valkey
          - dragonfly
          - opensearch
          - yugabytedb
          - questdb
          - ferretdb

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Download test binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          name: test-binary
          path: core

      - name: Make binary executable
        run: chmod +x core/server.test

      - name: Setup PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-playwright-

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y sqlite3 netcat-openbsd

      - name: Verify Docker Compose
        run: docker compose version

      - name: Create frontend build placeholder
        run: mkdir -p core/build && echo '<!doctype html>' > core/build/index.html

      - name: Run E2E tests (${{ matrix.database }})
        working-directory: frontend
        env:
          WHODB_SKIP_BUILD: "true"
        run: pnpm e2e:db:headless ${{ matrix.database }}

      - name: Upload blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.database }}
          path: frontend/e2e/reports/blobs/
          retention-days: 7

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: e2e-logs-${{ matrix.database }}
          path: frontend/e2e/logs/
          retention-days: 7

      - name: Upload failure artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: e2e-failure-artifacts-${{ matrix.database }}
          path: frontend/e2e/reports/test-results/
          if-no-files-found: warn
          retention-days: 14

  merge-reports:
    name: Merge Reports
    needs: [e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          pattern: blob-report-*
          path: all-blobs

      - name: Download all test logs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          digest-mismatch: warn
          pattern: e2e-logs-*
          path: all-logs

      - name: Flatten blob reports
        run: |
          mkdir -p merged-blobs
          for dir in all-blobs/blob-report-*; do
            db=$(basename "$dir" | sed 's/blob-report-//')
            for f in "$dir"/*.zip; do
              [ -f "$f" ] && cp "$f" "merged-blobs/${db}-$(basename "$f")"
            done
          done

      - name: Merge reports
        run: |
          PLAYWRIGHT_HTML_OPEN=never \
          PLAYWRIGHT_HTML_OUTPUT_DIR=playwright-report \
          pnpm --dir frontend exec playwright merge-reports \
            ../merged-blobs \
            --reporter=html

      - name: Upload merged HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Write E2E summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## CE E2E Summary"
            echo
            echo "| Database | Result | Slow Files |"
            echo "| --- | --- | --- |"
            for dir in all-logs/e2e-logs-*; do
              [ -d "$dir" ] || continue
              db=$(basename "$dir" | sed 's/e2e-logs-//')
              log="$dir/$db.log"
              if [ ! -f "$log" ]; then
                log=$(find "$dir" -maxdepth 1 -name '*.log' | head -1)
              fi
              if [ -z "$log" ] || [ ! -f "$log" ]; then
                echo "| \`$db\` | no log uploaded |  |"
                continue
              fi
              result=$(grep -E '[0-9]+ (passed|failed|skipped|flaky)' "$log" | tail -1 | sed 's/^[[:space:]]*//' || true)
              result=$(echo "$result" | sed 's/|/\\|/g')
              [ -n "$result" ] || result="no result line found"
              slow=$(grep 'Slow test file' "$log" | sed 's/^[[:space:]]*Slow test file: //' | awk 'BEGIN { first = 1 } { gsub(/\|/, "\\|"); if (!first) printf "<br>"; printf "%s", $0; first = 0 }' || true)
              [ -n "$slow" ] || slow="none"
              echo "| \`$db\` | $result | $slow |"
            done

            echo
            echo "### Recent Failures"
            any_failures=false
            for dir in all-logs/e2e-logs-*; do
              [ -d "$dir" ] || continue
              db=$(basename "$dir" | sed 's/e2e-logs-//')
              log="$dir/$db.log"
              if [ ! -f "$log" ]; then
                log=$(find "$dir" -maxdepth 1 -name '*.log' | head -1)
              fi
              [ -n "$log" ] && [ -f "$log" ] || continue
              if ! grep -Eq '(✘|[0-9]+ failed)' "$log"; then
                continue
              fi
              failures=$(grep -E '(✘|Error:|Timeout|failed)' "$log" | tail -20 || true)
              if [ -n "$failures" ]; then
                any_failures=true
                echo
                echo "<details><summary>$db</summary>"
                echo
                echo '```text'
                echo "$failures"
                echo '```'
                echo
                echo "</details>"
              fi
            done
            if [ "$any_failures" = "false" ]; then
              echo
              echo "No recent failure lines found in uploaded logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
