name: Lint & Typecheck

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@f111f3307d8850f15ac5505df13fb841c207d32a # v5.3.0
        with:
          go-version-file: core/go.mod

      - name: Lint
        run: |
          cd core
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 custom
          ./tmp/custom-gcl run ./...

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - uses: actions/setup-node@48b55a011bda9f5d6a4ebc2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Typecheck
        run: cd frontend && pnpm typecheck
