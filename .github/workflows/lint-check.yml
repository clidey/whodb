name: Lint, Test & Typecheck

on:
  pull_request:
  push:
    branches: [main, release]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-lint:
    name: Go Lint (Core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: core/go.mod

      - name: Cache golangci-lint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/whodb-go-tools/bin
          key: ${{ runner.os }}-golangci-lint-v2.12.2

      - name: Lint
        run: |
          cd core
          mkdir -p "$HOME/.cache/whodb-go-tools/bin"
          if [ ! -x "$HOME/.cache/whodb-go-tools/bin/golangci-lint" ]; then
            GOBIN="$HOME/.cache/whodb-go-tools/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          fi
          "$HOME/.cache/whodb-go-tools/bin/golangci-lint" custom
          ./custom-gcl run ./...

  cli-lint:
    name: Go Lint (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod

      - name: Cache golangci-lint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/whodb-go-tools/bin
          key: ${{ runner.os }}-golangci-lint-v2.12.2

      - name: Lint
        run: |
          mkdir -p "$HOME/.cache/whodb-go-tools/bin"
          if [ ! -x "$HOME/.cache/whodb-go-tools/bin/golangci-lint" ]; then
            GOBIN="$HOME/.cache/whodb-go-tools/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          fi
          cd cli
          "$HOME/.cache/whodb-go-tools/bin/golangci-lint" run --config .golangci.yml ./...

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: core/go.mod

      - name: Vet
        run: cd core && go vet ./...

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: core/go.mod

      - name: Build
        run: cd core && go build ./cmd/whodb

  go-test:
    name: Go Test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: core/go.mod

      - name: Unit Tests (CE)
        run: |
          cd core
          export GOCACHE="$PWD/.gocache"
          mkdir -p "$GOCACHE"
          go test -race -count=10 ./src/... ./graph/...

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build
        run: cd frontend && pnpm build:ce

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: frontend/package.json
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25.6.0'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Typecheck
        run: cd frontend && pnpm typecheck
