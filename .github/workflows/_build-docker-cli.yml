name: Build CLI Docker Images

# Produces:
# - docker-cli-image-amd64: transient scan handoff artifact.
# - docker-cli-image-arm64: transient scan handoff artifact.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
    outputs:
      amd64-artifact:
        description: 'AMD64 Docker artifact name'
        value: docker-cli-image-amd64
      arm64-artifact:
        description: 'ARM64 Docker artifact name'
        value: docker-cli-image-arm64

permissions:
  contents: read
  actions: write
  security-events: write

jobs:
  build-docker-cli:
    name: Build CLI Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: permission-required
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            44.225.180.214:443
            44.231.40.74:443
            api.github.com:443
            auth.docker.io:443
            check.trivy.dev:443
            dl-cdn.alpinelinux.org:443
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443
            s3.us-east-1.amazonaws.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            mirror.gcr.io:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Stamp plugin.json version
        run: |
          PLUGIN_JSON="cli/external-plugin/whodb/.claude-plugin/plugin.json"
          jq --arg v "${{ inputs.version }}" '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"

      - name: Build CLI Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./cli/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: clidey/whodb-cli:${{ inputs.version }}-${{ matrix.arch }}
          outputs: type=docker,dest=/tmp/whodb-cli-docker-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=ce-cli-docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ce-cli-docker-${{ matrix.arch }}
          build-args: |
            VERSION=${{ inputs.version }}

      - name: Load image for scan
        run: docker load -i /tmp/whodb-cli-docker-${{ matrix.arch }}.tar

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: clidey/whodb-cli:${{ inputs.version }}-${{ matrix.arch }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF report
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: trivy-results.sarif
          category: whodb-cli-docker-${{ matrix.arch }}

      - name: Upload Trivy SARIF artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif-whodb-cli-docker-${{ matrix.arch }}
          path: trivy-results.sarif
          retention-days: 7

      - name: Upload Docker artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-cli-image-${{ matrix.arch }}
          path: /tmp/whodb-cli-docker-${{ matrix.arch }}.tar
          retention-days: 7
