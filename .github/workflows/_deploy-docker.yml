name: Deploy to Docker Hub

# Rebuilds Docker images from GHA buildx cache (populated by _build-docker.yml)
# and pushes with SBOM + provenance attestations.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version being deployed'
        required: true
        type: string
      stage-only:
        description: 'Stage only deployment'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  push-docker:
    name: Push Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: deploy-docker
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            app.posthog.com:443
            auth.docker.io:443
            deb.debian.org:443
            deb.debian.org:80
            dl-cdn.alpinelinux.org:443
            github.com:443
            index.docker.io:443
            objects.githubusercontent.com:443
            production.cloudflare.docker.com:443
            proxy.golang.org:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            us.i.posthog.com:443
            us.posthog.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build from cache and push with attestations
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./core/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          provenance: mode=max
          tags: clidey/whodb:${{ inputs.version }}-${{ matrix.arch }}
          cache-from: type=gha
          build-args: |
            VERSION=${{ inputs.version }}
            PLATFORM=docker

  create-manifest:
    name: Create multi-arch manifest
    needs: push-docker
    runs-on: ubuntu-latest
    environment: deploy-docker
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            fulcio.sigstore.dev:443
            github.com:443
            index.docker.io:443
            production.cloudflare.docker.com:443
            registry-1.docker.io:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ inputs.version }}
          STAGE_ONLY: ${{ inputs.stage-only }}
        run: |
          echo "Creating multi-arch manifest for ${VERSION}..."
          docker buildx imagetools create \
            -t "clidey/whodb:${VERSION}" \
            "clidey/whodb:${VERSION}-amd64" \
            "clidey/whodb:${VERSION}-arm64"

          if [ "${STAGE_ONLY}" != "true" ]; then
            echo "Updating latest tag..."
            docker buildx imagetools create \
              -t clidey/whodb:latest \
              "clidey/whodb:${VERSION}-amd64" \
              "clidey/whodb:${VERSION}-arm64"
          fi

          echo "Docker images deployed successfully"

      - name: Sign Docker images with Cosign
        env:
          VERSION: ${{ inputs.version }}
          STAGE_ONLY: ${{ inputs.stage-only }}
        run: |
          curl -sSL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/

          echo "Signing Docker images..."
          cosign sign --yes "clidey/whodb:${VERSION}"

          if [ "${STAGE_ONLY}" != "true" ]; then
            cosign sign --yes clidey/whodb:latest
          fi

          echo "Docker images signed"
